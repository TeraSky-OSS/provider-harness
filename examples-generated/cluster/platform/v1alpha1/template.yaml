apiVersion: platform.harness.crossplane.io/v1alpha1
kind: Template
metadata:
  annotations:
    meta.upbound.io/example-id: platform/v1alpha1/template
  labels:
    testing.upbound.io/example-name: pipeline_template_remote
  name: pipeline-template-remote
spec:
  forProvider:
    comments: comments
    gitDetails:
    - branchName: main
      commitMessage: Commit
      connectorRef: account.connector_ref
      filePath: file_path
      repoName: repo_name
      storeType: REMOTE
    identifier: identifier
    isStable: true
    name: name
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: test
    templateYaml: |+
      template:
        name: "name"
        identifier: "identifier"
        versionLabel: "ab"
        type: Pipeline
        projectIdentifier: ${harness_platform_project.test.id}
        orgIdentifier: ${harness_platform_project.test.org_id}
        tags: {}
        spec:
          stages:
            - stage:
                identifier: dvvdvd
                name: dvvdvd
                description: ""
                type: Deployment
                spec:
                  deploymentType: Kubernetes
                  service:
                    serviceRef: <+input>
                    serviceInputs: <+input>
                  environment:
                    environmentRef: <+input>
                    deployToAll: false
                    environmentInputs: <+input>
                    serviceOverrideInputs: <+input>
                    infrastructureDefinitions: <+input>
                  execution:
                    steps:
                      - step:
                          name: Rollout Deployment
                          identifier: rolloutDeployment
                          type: K8sRollingDeploy
                          timeout: 10m
                          spec:
                            skipDryRun: false
                            pruningEnabled: false
                    rollbackSteps:
                      - step:
                          name: Rollback Rollout Deployment
                          identifier: rollbackRolloutDeployment
                          type: K8sRollingRollback
                          timeout: 10m
                          spec:
                            pruningEnabled: false
                tags: {}
                failureStrategies:
                  - onFailure:
                      errors:
                        - AllErrors
                      action:
                        type: StageRollback

    version: ab
