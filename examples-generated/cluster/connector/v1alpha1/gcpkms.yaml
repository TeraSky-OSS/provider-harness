  annotations:
    meta.upbound.io/example-id: connector/v1alpha1/gcpkms
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    description: test
    identifier: '%[1]s'
    name: '%[2]s'
    secretManagerIdentifier: harnessSecretManager
    tags:
    - foo:bar
    valueSecretRef:
      key: example-key
      name: example-secret
      namespace: upbound-system
    valueType: Reference
