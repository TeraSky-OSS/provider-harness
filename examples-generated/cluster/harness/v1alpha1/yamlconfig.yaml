apiVersion: harness.harness.crossplane.io/v1alpha1
kind: YamlConfig
metadata:
  annotations:
    meta.upbound.io/example-id: harness/v1alpha1/yamlconfig
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    content: |
      harnessApiVersion: '1.0'
      type: KUBERNETES_CLUSTER
      delegateSelectors:
      - k8s
      skipValidation: true
      useKubernetesDelegate: true
    path: Setup/Cloud Providers/Kubernetes.yaml
