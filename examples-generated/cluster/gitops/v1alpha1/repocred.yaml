apiVersion: gitops.harness.crossplane.io/v1alpha1
kind: RepoCred
metadata:
  annotations:
    meta.upbound.io/example-id: gitops/v1alpha1/repocred
  labels:
    testing.upbound.io/example-name: test
  name: test
spec:
  forProvider:
    accountId: account_id
    agentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    creds:
    - sshPrivateKeySecretRef:
        key: example-key
        name: example-secret
        namespace: upbound-system
      type: git
      url: git@github.com:yourorg
    identifier: identifier
    orgIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    projectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
