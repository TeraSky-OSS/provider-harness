apiVersion: autostopping.harness.crossplane.io/v1alpha1
kind: Alert
metadata:
  annotations:
    meta.upbound.io/example-id: autostopping/v1alpha1/alert
  labels:
    testing.upbound.io/example-name: specific-rule-alert
  name: specific-rule-alert
spec:
  forProvider:
    events:
    - autostopping_rule_created
    - autostopping_rule_updated
    - autostopping_rule_deleted
    - autostopping_warmup_failed
    - autostopping_cooldown_failed
    name: demo-alert
    recipients:
    - email:
      - user1@example.com
      - user2@example.com
      slack:
      - slack-web-hook-1
      - slack-web-hook-2
    ruleIdList:
    - 1234
