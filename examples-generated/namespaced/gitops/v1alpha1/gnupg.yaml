apiVersion: gitops.harness.m.crossplane.io/v1alpha1
kind: GnuPG
metadata:
  annotations:
    meta.upbound.io/example-id: gitops/v1alpha1/gnupg
  labels:
    testing.upbound.io/example-name: example
  name: example
  namespace: crossplane-system
spec:
  forProvider:
    accountId: account_id
    agentIdSelector:
      matchLabels:
        testing.upbound.io/example-name: example
    request:
    - publickey:
      - keyData: '-----BEGIN PGP PUBLIC KEY BLOCK-----XXXXXX-----END PGP PUBLIC KEY
          BLOCK-----'
      upsert: true
