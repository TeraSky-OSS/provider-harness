apiVersion: connector.harness.m.crossplane.io/v1alpha1
kind: AwsSecretManager
metadata:
  annotations:
    meta.upbound.io/example-id: connector/v1alpha1/awssecretmanager
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: crossplane-system
spec:
  forProvider:
    credentials:
    - inheritFromDelegate: true
    delegateSelectors:
    - harness-delegate
    description: test
    identifier: identifier
    name: name
    region: us-east-1
    secretNamePrefix: test
    tags:
    - foo:bar
    usePutSecret: false
