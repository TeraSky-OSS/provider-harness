apiVersion: connector.harness.m.crossplane.io/v1alpha1
kind: Jenkins
metadata:
  annotations:
    meta.upbound.io/example-id: connector/v1alpha1/jenkins
  labels:
    testing.upbound.io/example-name: test
  name: test
  namespace: crossplane-system
spec:
  forProvider:
    auth:
    - jenkinsUserNamePassword:
      - passwordRef: account.${harness_platform_secret_text.test.id}
        username: username
      type: UsernamePassword
    delegateSelectors:
    - harness-delegate
    description: test
    identifier: identifier
    jenkinsUrl: https://jenkinss.com/
    name: name
    tags:
    - foo:bar
