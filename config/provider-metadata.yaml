    harness_ssh_credential:
        subCategory: First Gen
        description: Resource for creating an encrypted text secret
        name: harness_ssh_credential
        title: harness_ssh_credential Resource - terraform-provider-harness
        examples:
            - name: ssh_creds
              manifest: |-
                {
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "ssh_authentication"
                      ]
                    }
                  ],
                  "name": "ssh-test",
                  "ssh_authentication": [
                    {
                      "inline_ssh": [
                        {
                          "ssh_key_file_id": "${harness_encrypted_text.my_secret.id}"
                        }
                      ],
                      "port": 22,
                      "username": "git"
                    }
                  ]
                }
              references:
                ssh_authentication.inline_ssh.ssh_key_file_id: harness_encrypted_text.my_secret.id
              dependencies:
                harness_encrypted_text.my_secret: |-
                    {
                      "name": "my_secret",
                      "secret_manager_id": "${data.harness_secret_manager.secret_manager.id}",
                      "value": "${tls_private_key.harness_deploy_key.private_key_pem}"
                    }
                tls_private_key.harness_deploy_key: |-
                    {
                      "algorithm": "RSA",
                      "rsa_bits": 4096
                    }
        argumentDocs:
            application_id: (String) Id of the application to scope to. If empty then this scope applies to all applications.
            environment_filter_type: (String) Type of environment filter applied. Cannot be used with environment_id. Valid options are NON_PRODUCTION_ENVIRONMENTS, PRODUCTION_ENVIRONMENTS.
            environment_id: (String) Id of the id of the specific environment to scope to. Cannot be used with environment_filter_type.
            id: (String) Id of the encrypted text secret
            inline_ssh: '(Block List, Max: 1) Inline SSH authentication configuration. Only ond of passphrase_secret_id or ssh_key_file_id should be used (see below for nested schema)'
            kerberos_authentication: '(Block List, Max: 1) Kerberos authentication for SSH. Cannot be used if ssh_authentication is specified (see below for nested schema)'
            kerberos_password_id: (String) The id of the encrypted text secret
            key_tab_file_path: (String) The path to the key tab file
            name: (String) Name of the encrypted text secret
            passphrase_secret_id: (String) The id of the encrypted secret to use
            password_secret_id: (String) The id of the encrypted secret
            path: (String) The path to the key file on the delegate
            port: (Number) Port to use for Kerberos authentication
            principal: (String) Name of the principal for authentication
            realm: (String) Realm associated with the Kerberos authentication
            server_password: '(Block List, Max: 1) Server password authentication configuration (see below for nested schema)'
            ssh_authentication: '(Block List, Max: 1) Authentication method for SSH. Cannot be used if kerberos_authentication is specified. Only one of inline_ssh, server_password, or ssh_key_file should be set (see below for nested schema)'
            ssh_key_file: '(Block List, Max: 1) Use ssh key file for authentication (see below for nested schema)'
            ssh_key_file_id: (String) The id of the secret containing the SSH key
            tgt_generation_method: '(Block List, Max: 1) TGT generation method (see below for nested schema)'
            usage_scope: (Block Set) This block is used for scoping the resource to a specific set of applications or environments. (see below for nested schema)
            username: (String) The username to use when connecting to ssh
        importStatements:
            - |-
              # Import using the Harness ssh credential id
              terraform import harness_ssh_credential.example <credential_id>
