                  "hub_identity": "my-chaos-hub",
                  "hub_org_id": "my_org",
                  "identity": "cross-scope-experiment",
                  "import_type": "REFERENCE",
                  "infra_ref": "my-env/my-infra",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${tags}"
                      ]
                    }
                  ],
                  "name": "Cross-Scope Experiment",
                  "org_id": "my_org",
                  "project_id": "my_project",
                  "tags": [
                    "chaos",
                    "cross-scope",
                    "org-template"
                  ],
                  "template_identity": "my-template"
                }
              references:
                lifecycle.ignore_changes: tags
        argumentDocs:
            created_at: (Number) Creation timestamp (Unix)
            created_by: (String) Username of the creator
            cron_syntax: (String) Cron expression for scheduled execution
            description: (String) Description of the chaos experiment
            experiment_id: (String) Full experiment ID
            experiment_type: (String) Type of the experiment
            fault_ids: (List of String) List of fault IDs used in the experiment
            hub_identity: '(String) Identity of the hub where the experiment template resides. Must include scope prefix for account and org levels: ''account.my-hub'' for account-level hubs, ''org.my-hub'' for org-level hubs, or just ''my-hub'' for project-level hubs (no prefix)'
            hub_org_id: (String) Organization identifier where the hub/template resides (leave empty for account-level hubs). This is used to locate the template, not where the experiment will be created.
            hub_project_id: (String) Project identifier where the hub/template resides (leave empty for org-level or account-level hubs). This is used to locate the template, not where the experiment will be created.
            hub_reference: (String)
            id: (String) The ID of this resource.
            identity: (String) Unique identifier for the experiment (auto-generated if not provided)
            import_type: '(String) Import type: REFERENCE (template reference) or LOCAL (full copy). Default: REFERENCE'
            infra_id: (String) Resolved infrastructure ID
            infra_ref: (String) Infrastructure reference (ID or identity) to bind the experiment to
            infra_type: (String) Infrastructure type (e.g., KubernetesV2)
            is_cron_enabled: (Boolean) Whether cron scheduling is enabled
            is_custom_experiment: (Boolean) Whether this is a custom experiment
            is_single_run_cron_enabled: (Boolean) Whether single-run cron is enabled
            last_executed_at: (Number) Timestamp of last execution
            manifest: (String) Full experiment manifest YAML (populated for LOCAL imports)
            name: (String) Name of the chaos experiment
            org_id: (String) Organization identifier where the experiment will be created
            project_id: (String) Project identifier where the experiment will be created
            reference: (String)
            revision: '(String) Template revision to use (default: v1)'
            tags: '(Set of String) Tags to categorize the experiment. Note: Only user-configured tags are tracked in state. The API may add system-generated tags which are automatically filtered to prevent drift.'
            target_network_map_id: (String) Target network map ID
            template_details: (List of Object) Details about the experiment template used (see below for nested schema)
            template_identity: (String) Identity of the experiment template to launch from
            total_experiment_runs: (Number) Total number of experiment runs
            updated_at: (Number) Last update timestamp (Unix)
            updated_by: (String) Username of the last updater
        importStatements:
            - |-
              #!/bin/bash
              # ============================================================================
              # Harness Chaos Experiment Import Examples
              # ============================================================================
              #
              # Import Format: org_id/project_id/experiment_identity
              #
              # ============================================================================

              # ----------------------------------------------------------------------------
              # Example 1: Import Project-Level Experiment
              # ----------------------------------------------------------------------------
              terraform import harness_chaos_experiment.basic \
                my_org/my_project/my-chaos-experiment

              # ----------------------------------------------------------------------------
              # After Import
              # ----------------------------------------------------------------------------
              # 1. Run `terraform state show harness_chaos_experiment.example` to see imported values
              # 2. Run `terraform plan` to check for configuration drift
              # 3. Update your .tf file to match the imported state
              #
              # Required configuration after import:
              #   - org_id, project_id
              #   - hub_org_id, hub_project_id, hub_identity
              #   - template_identity
              #   - name, infra_ref
              #   - import_type (default: "REFERENCE")
              # ----------------------------------------------------------------------------
    harness_chaos_experiment_template:
        subCategory: Next Gen
        description: Resource for managing Harness Chaos Experiment Templates. Experiment templates define reusable chaos experiments with actions, faults, and probes.
        name: harness_chaos_experiment_template
        title: harness_chaos_experiment_template Resource - terraform-provider-harness
        examples:
            - name: simple_fault
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Basic experiment with single pod delete fault",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "simple-pod-delete",
                  "name": "Simple Pod Delete Experiment",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "spec": [
                    {
                      "cleanup_policy": "delete",
                      "faults": [
                        {
                          "auth_enabled": false,
                          "identity": "pod-delete",
                          "is_enterprise": true,
                          "name": "pod-delete-fault",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "TARGET_WORKLOAD_KIND",
                              "value": "deployment"
                            },
                            {
                              "name": "TARGET_WORKLOAD_NAMESPACE",
                              "value": "\u003c+input\u003e.default('default')"
                            },
                            {
                              "name": "TOTAL_CHAOS_DURATION",
                              "value": "\u003c+input\u003e.default('30s')"
                            }
                          ]
                        }
                      ],
                      "infra_type": "KubernetesV2",
                      "vertices": [
                        {
                          "end": [
                            {}
                          ],
                          "name": "pod-delete-vertex",
                          "start": [
                            {
                              "faults": [
                                {
                                  "name": "pod-delete-fault"
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "tags": [
                    "kubernetes",
                    "pod-delete",
                    "simple"
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: with_action
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Experiment with action before fault",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "action-and-fault",
                  "name": "Action and Fault Experiment",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "spec": [
                    {
                      "actions": [
                        {
                          "continue_on_completion": false,
                          "identity": "notification-action",
                          "is_enterprise": false,
                          "name": "pre-chaos-notification",
                          "values": [
                            {
                              "name": "MESSAGE",
                              "value": "Starting chaos experiment"
                            }
                          ]
                        }
                      ],
                      "cleanup_policy": "delete",
                      "faults": [
                        {
                          "auth_enabled": false,
                          "identity": "container-kill",
                          "is_enterprise": true,
                          "name": "container-kill-fault",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "TARGET_WORKLOAD_KIND",
                              "value": "deployment"
                            },
                            {
                              "name": "TARGET_WORKLOAD_NAMESPACE",
                              "value": "\u003c+input\u003e"
                            },
                            {
                              "name": "TOTAL_CHAOS_DURATION",
                              "value": "\u003c+input\u003e.default('30s')"
                            }
                          ]
                        }
                      ],
                      "infra_type": "KubernetesV2",
                      "vertices": [
                        {
                          "end": [
                            {}
                          ],
                          "name": "action-vertex",
                          "start": [
                            {
                              "actions": [
                                {
                                  "name": "pre-chaos-notification"
                                }
                              ]
                            }
                          ]
                        },
                        {
                          "end": [
                            {}
                          ],
                          "name": "fault-vertex",
                          "start": [
                            {
                              "faults": [
                                {
                                  "name": "container-kill-fault"
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "tags": [
                    "kubernetes",
                    "action",
                    "fault"
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: complex
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Complete experiment with actions, faults, and probes",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "complex-experiment",
                  "name": "Complex Chaos Experiment",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "spec": [
                    {
                      "actions": [
                        {
                          "continue_on_completion": false,
                          "identity": "notification-action",
                          "is_enterprise": false,
                          "name": "start-notification",
                          "values": [
                            {
                              "name": "MESSAGE",
                              "value": "Chaos experiment started"
                            }
                          ]
                        }
                      ],
                      "cleanup_policy": "delete",
                      "faults": [
                        {
                          "auth_enabled": false,
                          "identity": "pod-delete",
                          "is_enterprise": true,
                          "name": "pod-delete-fault",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "TARGET_WORKLOAD_KIND",
                              "value": "deployment"
                            },
                            {
                              "name": "TARGET_WORKLOAD_NAMESPACE",
                              "value": "\u003c+input\u003e"
                            },
                            {
                              "name": "TOTAL_CHAOS_DURATION",
                              "value": "\u003c+input\u003e.default('30s')"
                            }
                          ]
                        },
                        {
                          "auth_enabled": false,
                          "identity": "pod-network-latency",
                          "is_enterprise": true,
                          "name": "network-latency-fault",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "TARGET_WORKLOAD_KIND",
                              "value": "deployment"
                            },
                            {
                              "name": "TARGET_WORKLOAD_NAMESPACE",
                              "value": "\u003c+input\u003e"
                            },
                            {
                              "name": "NETWORK_LATENCY",
                              "value": "\u003c+input\u003e.default('2000')"
                            }
                          ]
                        }
                      ],
                      "infra_type": "KubernetesV2",
                      "probes": [
                        {
                          "conditions": [
                            "onChaosStart",
                            "duringChaos",
                            "afterChaos"
                          ],
                          "duration": 30,
                          "enable_data_collection": false,
                          "identity": "pod-status-check",
                          "is_enterprise": true,
                          "name": "pod-status-probe",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "TARGET_NAMESPACE",
                              "value": "\u003c+input\u003e"
                            }
                          ],
                          "weightage": 10
                        },
                        {
                          "conditions": [
                            "duringChaos",
                            "afterChaos"
                          ],
                          "duration": 30,
                          "enable_data_collection": false,
                          "identity": "http-health-check",
                          "is_enterprise": true,
                          "name": "http-health-probe",
                          "revision": "v1",
                          "values": [
                            {
                              "name": "URL",
