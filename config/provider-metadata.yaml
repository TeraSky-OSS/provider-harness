        description: Resource for creating an AWS cloud provider. This resource uses the config-as-code API's. When updating the name or path of this resource you should typically also set the create_before_destroy = true lifecycle setting.
        name: harness_cloudprovider_aws
        title: harness_cloudprovider_aws Resource - terraform-provider-harness
        examples:
            - name: aws
              manifest: |-
                {
                  "access_key_id_secret_name": "${harness_encrypted_text.aws_access_key.name}",
                  "name": "Example aws cloud provider",
                  "secret_access_key_secret_name": "${harness_encrypted_text.aws_secret_key.name}"
                }
              references:
                access_key_id_secret_name: harness_encrypted_text.aws_access_key.name
                secret_access_key_secret_name: harness_encrypted_text.aws_secret_key.name
              dependencies:
                harness_encrypted_text.aws_access_key: |-
                    {
                      "name": "aws_access_key",
                      "secret_manager_id": "${data.harness_secret_manager.default.id}",
                      "value": "\u003cACCESS_KEY_ID\u003e"
                    }
                harness_encrypted_text.aws_secret_key: |-
                    {
                      "name": "aws_secret_key",
                      "secret_manager_id": "${data.harness_secret_manager.default.id}",
                      "value": "\u003cSECRET_KEY_ID\u003e"
                    }
        argumentDocs:
            access_key_id: (String) The plain text AWS access key id.
            access_key_id_secret_name: (String) The name of the Harness secret containing the AWS access key id
            application_id: (String) Id of the application to scope to. If empty then this scope applies to all applications.
