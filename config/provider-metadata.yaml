            filter_visibility: (String) This indicates visibility of filters. By default, everyone can view this filter.
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            module_properties: '(Block List, Max: 1) module properties of the pipline filter. (see below for nested schema)'
            name: (String) Name of the pipeline filters.
            org_id: (String) Organization Identifier for the Entity.
            pipeline_identifiers: (List of String) Pipeline identifiers to filter on.
            pipeline_name: (String) Name of the pipeline execution filter.
            pipeline_tags: (List of Map of String) Tags to associate with the pipeline. tags should be in the form of {key:key1, value:key1value}
            project_id: (String) Project Identifier for the Entity.
            pull_request: '(Block List, Max: 1) The pull request details of the CI pipeline. (see below for nested schema)'
            repo_names: (String) name of the repository used in the pipeline.
            service_definition_types: (String) Deployment type of the CD pipeline, eg. Kubernetes
            service_identifiers: (Set of String) Service identifiers of the CD pipeline.
            service_names: (Set of String) Service names of the CD pipeline.
            source_branch: (String) Source branch of the pull request.
            tag: (String) Tags to associate with the CI pipeline resource.
            tags: (Set of String) Tags to associate with the resource. Tags should be in the form name:value.
            target_branch: (String) Target branch of the pull request.
            type: (String) Type of pipeline filters. Currently supported types are {PipelineSetup, PipelineExecution, Deployment, Template, EnvironmentGroup, Environment}
        importStatements:
            - |-
              # Import account level pipeline filter
              terraform import harness_platform_pipeline_filters.example <filter_id>/<type>

              # Import org level pipeline filter
              terraform import harness_platform_pipeline_filters.example <ord_id>/<filter_id>/<type>

              # Import project level pipeline filter
              terraform import harness_platform_pipeline_filters.example <org_id>/<project_id>/<filter_id>/<type>
    harness_platform_policy:
        subCategory: Next Gen
        description: Resource for creating a Harness Policy.
        name: harness_platform_policy
        title: harness_platform_policy Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "description": "${harness_platform_policy.test.description}",
                  "git_base_branch": "${harness_platform_policy.test.git_base_branch}",
                  "git_branch": "${harness_platform_policy.test.git_branch}",
                  "git_commit_msg": "${harness_platform_policy.test.git_commit_msg}",
                  "git_connector_ref": "${harness_platform_policy.test.git_connector_ref}",
                  "git_import": false,
                  "git_is_new_branch": false,
                  "git_path": "${harness_platform_policy.test.git_path}",
                  "git_repo": "${harness_platform_policy.test.git_repo}",
                  "identifier": "${harness_platform_policy.test.identifier}",
                  "name": "${harness_platform_policy.test.name}",
                  "org_id": "${harness_platform_policy.test.org_id}",
                  "project_id": "${harness_platform_policy.test.project_id}",
                  "rego": "package pipeline\n\n# Deny pipelines that don't have an approval step\n# NOTE: Try removing the HarnessApproval step from your input to see the policy fail\ndeny[msg] {\n    # Find all stages that are Deployments ...\n    input.pipeline.stages[i].stage.type == \"Approval\"\n\n    # ... that are not in the set of stages with HarnessApproval steps\n    not stages_with_approval[i]\n\n    # Show a human-friendly error message\n    msg := sprintf(\"Approval stage '%s' does not have a HarnessApproval step\", [input.pipeline.stages[i].stage.name])\n}\n\n# Find the set of stages that contain a HarnessApproval step\nstages_with_approval[i] {\n    input.pipeline.stages[i].stage.spec.execution.steps[_].step.type == \"HarnessApproval\"\n}\n"
                }
              references:
                description: harness_platform_policy.test.description
                git_base_branch: harness_platform_policy.test.git_base_branch
                git_branch: harness_platform_policy.test.git_branch
                git_commit_msg: harness_platform_policy.test.git_commit_msg
                git_connector_ref: harness_platform_policy.test.git_connector_ref
                git_path: harness_platform_policy.test.git_path
                git_repo: harness_platform_policy.test.git_repo
                identifier: harness_platform_policy.test.identifier
                name: harness_platform_policy.test.name
                org_id: harness_platform_policy.test.org_id
                project_id: harness_platform_policy.test.project_id
        argumentDocs:
            description: (String) Description of the resource.
            git_base_branch: (String) Base branch for the new git branch.
            git_branch: (String) Git branch for the policy.
            git_commit_msg: (String) Git commit message for the policy.
            git_commit_sha: (String) The existing commit sha of the file being updated
            git_connector_ref: (String) Git connector reference for the policy.
            git_file_id: (String) The existing file id of the file being updated, not required for bitbucket files
            git_import: (Boolean) Flag to import the policy from git.
            git_is_new_branch: (Boolean) Flag to create a new branch for the policy.
            git_path: (String) Git path for the policy.
            git_repo: (String) Git repository for the policy.
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            name: (String) Name of the resource.
            org_id: (String) Unique identifier of the organization.
            project_id: (String) Unique identifier of the project.
            rego: (String) Rego code for the policy.
            tags: (Set of String) Tags to associate with the resource.
        importStatements:
            - |-
              # Import using the organization id
              terraform import harness_platform_policy.example <organization_id>
