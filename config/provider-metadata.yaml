        argumentDocs:
            action: (String) Action to take for the routing rule
            cloud_connector_id: (String) Id of the cloud connector
            connect: '(Map of Number) Connection information (source ports on the proxy). Keys: "ssh" and "rdp" for SSH/RDP; other keys are target port as string (e.g. "80") for forward_rule, value is the proxy source port.'
            connect_on: (Number) Port to listen on the proxy
            custom_domains: (List of String) Custom URLs used to access the instances
            delay_in_sec: (Number) Number of seconds the rule should wait after warming up the dependent rule
            depends: (Block List) Dependent rules (see below for nested schema)
            dry_run: (Boolean) Boolean that indicates whether the AutoStopping rule should be created in DryRun mode
            filter: '(Block List, Min: 1, Max: 1) (see below for nested schema)'
            forward_rule: (Block List) Additional tcp forwarding rules (see below for nested schema)
            health: (Block List) Health Check Details (see below for nested schema)
            http: (Block List) Http routing configuration (see below for nested schema)
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource
            idle_time_mins: (Number) Idle time in minutes. This is the time that the AutoStopping rule waits before stopping the idle instances.
            key: (String)
            name: (String) Name of the rule
            path: (String) API path to use for health check
            port: (Number) Health check port on the VM
            protocol: (String) Protocol can be http or https
            proxy_id: (String) Id of the proxy
            rdp: (Block List) RDP configuration (see below for nested schema)
            regions: (List of String) Regions of instances that needs to be managed using the AutoStopping rules
            routing: (Block List) Routing configuration used to access the instances (see below for nested schema)
            rule_id: (Number) Rule id of the dependent rule
            source_port: (Number) Port on the proxy
            source_protocol: (String) Source protocol of the proxy can be http or https
            ssh: (Block List) SSH configuration (see below for nested schema)
            status_code_from: (Number) Lower limit for acceptable status code
            status_code_to: (Number) Upper limit for acceptable status code
            tags: (Block List) Tags of instances that needs to be managed using the AutoStopping rules (see below for nested schema)
            target_port: (Number) Port on the VM
            target_protocol: (String) Target protocol of the instance can be http or https
            tcp: (Block List) TCP routing configuration (see below for nested schema)
            timeout: (Number) Health check timeout
            use_spot: (Boolean) Boolean that indicates whether the selected instances should be converted to spot vm
            value: (String)
            vm_ids: (List of String) Ids of instances that needs to be managed using the AutoStopping rules
            zones: (List of String) Zones of instances that needs to be managed using the AutoStopping rules
        importStatements: []
    harness_autostopping_schedule:
        subCategory: Next Gen
        description: Resource for creating a fixed schedule for Harness AutoStopping rule
        name: harness_autostopping_schedule
        title: harness_autostopping_schedule Resource - terraform-provider-harness
        examples:
            - name: MondayWholeDayUp
              manifest: |-
                {
                  "name": "MondayWholeDayUp",
                  "repeats": [
                    {
                      "days": [
                        "MON"
                      ]
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "uptime",
                  "time_zone": "UTC"
                }
            - name: MondayUpTill4:30pm
              manifest: |-
                {
                  "name": "MondayUpTill4:30pm",
                  "repeats": [
                    {
                      "days": [
                        "MON"
                      ],
                      "end_time": "16:30"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "uptime",
                  "time_zone": "UTC"
                }
            - name: MondayThroughFridayUptimeFrom9amTo6pm
              manifest: |-
                {
                  "name": "MondayThroughFridayUptimeFrom9amTo6pm",
                  "repeats": [
                    {
                      "days": [
                        "MON",
                        "TUE",
                        "WED",
                        "THU",
                        "FRI"
                      ],
                      "end_time": "18:00",
                      "start_time": "09:00"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "uptime",
                  "time_zone": "UTC"
                }
            - name: MondayThroughFridayUptimeFrom9amTo6pmStartingFromDate
              manifest: |-
                {
                  "name": "MondayThroughFridayUptimeFrom9amTo6pmStartingFrom",
                  "repeats": [
                    {
                      "days": [
                        "MON",
                        "TUE",
                        "WED",
                        "THU",
                        "FRI"
                      ],
                      "end_time": "18:00",
                      "start_time": "09:00"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "uptime",
                  "starting_from": "2023-01-02 15:04:05",
                  "time_zone": "UTC"
                }
            - name: DownTimeForISTLuchOnEveryFridayInBetweenDate
              manifest: |-
                {
                  "ending_on": "2023-02-02 15:04:05",
                  "name": "DownTimeForISTLuchOnEveryFridayInBetweenDate",
                  "repeats": [
                    {
                      "days": [
                        "FRI"
                      ],
                      "end_time": "14:30",
                      "start_time": "12:30"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "downtime",
                  "starting_from": "2023-01-02 15:04:05",
                  "time_zone": "Asia/Calcutta"
                }
            - name: DowntimeEveryFridayAfterNoonTillEOD
              manifest: |-
                {
                  "name": "DowntimeEveryFridayAfterNoonTillEOD",
                  "repeats": [
                    {
                      "days": [
                        "FRI"
                      ],
                      "start_time": "17:30"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "downtime",
                  "time_zone": "Asia/Calcutta"
                }
            - name: CompleteDownTimeOnWeekEnd
              manifest: |-
                {
                  "name": "CompleteDownTimeOnWeekEnd",
                  "repeats": [
                    {
                      "days": [
                        "SUN",
                        "SAT"
                      ]
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "downtime",
                  "time_zone": "UTC"
                }
            - name: TriggerDowntimeOnceOnDate
              manifest: |-
                {
                  "name": "TriggerDowntimeOnceOnDate",
                  "rules": [
                    123
                  ],
                  "schedule_type": "downtime",
                  "starting_from": "2023-01-02 15:04:05",
                  "time_zone": "UTC"
                }
            - name: OverNightDowntimeOnWeekDays
              manifest: |-
                {
                  "name": "OverNightDowntimeOnWeekDays",
                  "repeats": [
                    {
                      "days": [
                        "MON",
                        "TUE",
                        "WED",
                        "THU",
                        "FRI"
                      ],
                      "end_time": "07:00",
                      "start_time": "18:00"
                    }
                  ],
                  "rules": [
                    123
                  ],
                  "schedule_type": "downtime",
                  "time_zone": "Asia/Calcutta"
                }
        argumentDocs:
            days: (Set of String) List of days on which schedule need to be active. Valid values are SUN, MON, TUE, WED, THU, FRI and SAT.
            end_time: '(String) Ending time of schedule action on the day. Defaults to 24:00Hrs unless specified. Accepted format is HH:MM. Eg : 20:00 for 8pm'
            ending_on: (String) Time until which schedule will be active. Need to be in YYYY-MM-DD HH:mm:SS format. Eg 2006-01-02 15:04:05
            id: (String) The ID of this resource.
            identifier: (Number) Unique identifier of the schedule
            name: (String) Name of the schedule
            repeats: (Block List) For defining periodic schedule. Periodic nature will be applicable from the time of creation of schedule, unless specific 'time_period' is specified (see below for nested schema)
            rules: (List of Number) ID of AutoStopping rules on which the schedule applies
            schedule_type: (String) Type of the schedule. Valid values are uptime and downtime
            start_time: '(String) Starting time of schedule action on the day. Defaults to 00:00Hrs unless specified. Accepted format is HH:MM. Eg : 13:15 for 01:15pm'
            starting_from: (String) Time from which schedule will be active. Schedule will take immediate effect if starting_from is not specified. Need to be in YYYY-MM-DD HH:mm:SS format. Eg 2006-01-02 15:04:05
            time_zone: (String) Time zone in which schedule needs to be executed
        importStatements: []
    harness_chaos_action_template:
        subCategory: Next Gen
        description: Resource for managing Harness Chaos Action Templates. Action templates define reusable actions that can be used in chaos experiments.
        name: harness_chaos_action_template
        title: harness_chaos_action_template Resource - terraform-provider-harness
        examples:
            - name: container_with_runtime_inputs
              manifest: |-
                {
                  "container_action": [
                    {
                      "annotations": {
                        "description": "Chaos container action",
                        "owner": "chaos-team"
                      },
                      "args": "echo 'Running container action'; sleep 15",
                      "command": [
                        "\u003c+input\u003e.default('sh')"
                      ],
                      "env": [
                        {
                          "name": "TEST_VAR",
                          "value": "\u003c+input\u003e.default('test_value')"
                        },
                        {
                          "name": "ANOTHER_VAR",
                          "value": "\u003c+input\u003e.default('another_value')"
                        }
                      ],
                      "image": "\u003c+input\u003e.default('busybox:latest')",
                      "labels": {
                        "app": "chaos-action",
                        "environment": "production",
                        "managed-by": "terraform"
                      },
                      "namespace": "\u003c+input\u003e.default('default')",
                      "node_selector": {
                        "disktype": "ssd",
                        "zone": "us-west-1a"
                      },
                      "resources": [
                        {
                          "limits": {
                            "cpu": "500m",
                            "memory": "512Mi"
                          },
                          "requests": {
                            "cpu": "250m",
                            "memory": "256Mi"
                          }
                        }
                      ]
                    }
                  ],
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Container action with runtime inputs and defaults",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "container-action-template",
                  "infrastructure_type": "\u003c+input\u003e.default('Kubernetes')",
                  "name": "Container Action Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "interval": "\u003c+input\u003e.default('15s')",
                      "timeout": "\u003c+input\u003e.default('60s')"
                    }
                  ],
                  "tags": [
                    "container",
                    "kubernetes",
                    "runtime-inputs"
                  ],
                  "type": "container",
                  "variables": [
                    {
                      "description": "Container image to use (runtime input)",
                      "name": "container_image",
                      "required": true,
                      "type": "string",
                      "value": "\u003c+input\u003e"
                    },
                    {
                      "description": "Kubernetes namespace (runtime input)",
                      "name": "namespace",
                      "required": false,
                      "type": "string",
                      "value": "\u003c+input\u003e"
                    }
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: delay_action
              manifest: |-
                {
                  "delay_action": [
                    {
                      "duration": "\u003c+input\u003e.default('30s')"
                    }
                  ],
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Simple delay action for wait time",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "delay-action-template",
                  "infrastructure_type": "Kubernetes",
                  "name": "Delay Action Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "timeout": "60s"
                    }
                  ],
                  "tags": [
                    "delay",
                    "wait"
                  ],
                  "type": "delay"
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: script_action
              manifest: |-
                {
                  "custom_script_action": [
                    {
                      "env": [
                        {
                          "name": "TARGET",
                          "value": "\u003c+input\u003e.default('default-target')"
                        }
                      ],
                      "script": "#!/bin/bash\necho \"Running custom chaos script\"\necho \"Target: \u003c+input\u003e\"\nsleep 10\necho \"Script completed\"\n",
                      "shell": "bash"
                    }
                  ],
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Custom script action for chaos operations",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "script-action-template",
                  "infrastructure_type": "\u003c+input\u003e.default('Kubernetes')",
                  "name": "Script Action Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "interval": "30s",
                      "timeout": "\u003c+input\u003e.default('120s')"
                    }
                  ],
                  "tags": [
                    "script",
                    "custom"
                  ],
                  "type": "script",
                  "variables": [
                    {
                      "description": "Target resource for the script",
                      "name": "target_resource",
                      "required": true,
                      "type": "string",
                      "value": "\u003c+input\u003e"
                    }
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
        argumentDocs:
            account_id: (String) Account identifier.
            annotations: (Map of String) Annotations to apply to the container pod.
            args: (String) Arguments to pass to the container command.
            claim_name: (String) PVC name.
            command: (List of String) Command to run in the container.
            config_map: '(Block List, Max: 1) ConfigMap volume configuration. (see below for nested schema)'
            container_action: '(Block List, Max: 1) Container action configuration. Required when type is ''container''. (see below for nested schema)'
            created_at: (Number) Creation timestamp (Unix epoch).
            created_by: (String) User who created the action template.
            custom_script_action: '(Block List, Max: 1) Custom script action configuration. Required when type is ''customScript''. (see below for nested schema)'
            delay_action: '(Block List, Max: 1) Delay action configuration. Required when type is ''delay''. (see below for nested schema)'
            description: (String) Description of the action template.
            duration: (String) Duration of the delay (e.g., '30s', '5m', '1h').
            effect: (String) Taint effect (NoSchedule, PreferNoSchedule, NoExecute).
            empty_dir: '(Block List, Max: 1) EmptyDir volume configuration. (see below for nested schema)'
            env: (Block List) Environment variables for the container. (see below for nested schema)
            host_ipc: (Boolean) Use host IPC namespace.
            host_network: (Boolean) Use host network namespace.
            host_path: '(Block List, Max: 1) HostPath volume configuration. (see below for nested schema)'
            host_pid: (Boolean) Use host PID namespace.
            hub_identity: (String) Identity of the chaos hub this action template belongs to.
            id: (String) The ID of this resource.
            id_internal: (String) Internal ID of the action template.
            identity: (String) Unique identifier for the action template (immutable).
            image: (String) Container image to use (e.g., 'busybox:latest').
            image_pull_policy: (String) Image pull policy (Always, IfNotPresent, Never). Supports runtime inputs like <+input>.allowedValues(...).
            image_pull_secrets: (List of String) List of image pull secrets for private registries.
            infrastructure_type: '(String) Infrastructure type for the action template. Valid values: Kubernetes, KubernetesV2, Windows, Linux, CloudFoundry, Container. Supports runtime inputs like <+input>.'
            initial_delay: (String) Initial delay before action execution (e.g., '5s', '1m').
            interval: (String) Interval between retries (e.g., '10s', '30s').
            is_default: (Boolean) Whether this is the default version for predefined actions.
            is_enterprise: (Boolean) Whether this is an enterprise action template.
            is_removed: (Boolean) Whether the action template has been removed.
            key: (String) Taint key to tolerate.
            labels: (Map of String) Labels to apply to the container pod.
            limits: (Map of String) Resource limits.
            max_retries: (Number) Maximum number of retries.
            medium: (String) Storage medium (empty string for default, Memory for tmpfs).
            mount_path: (String) Path to mount the volume in the container.
            name: (String) Name of the action template.
            namespace: (String) Kubernetes namespace for the container.
            node_selector: (Map of String) Node selector for pod scheduling.
            operator: (String) Operator (Exists, Equal).
            optional: (Boolean) Whether the ConfigMap is optional.
            org_id: (String) Organization identifier.
            path: (String) Host path.
            persistent_volume_claim: '(Block List, Max: 1) PersistentVolumeClaim configuration. (see below for nested schema)'
            project_id: (String) Project identifier.
            read_only: (Boolean) Mount as read-only.
            requests: (Map of String) Resource requests.
            required: (Boolean) Whether the variable is required.
            resources: '(Block List, Max: 1) Resource requirements for the container. (see below for nested schema)'
            revision: (Number) Revision number of the action template.
            run_properties: '(Block List, Max: 1) Run properties for the action template execution. (see below for nested schema)'
            secret: '(Block List, Max: 1) Secret volume configuration. (see below for nested schema)'
            secret_name: (String) Secret name.
            service_account_name: (String) Kubernetes service account name.
            size_limit: (String) Size limit (e.g., '1Gi').
            stop_on_failure: (Boolean) Whether to stop on failure.
            sub_path: (String) Sub-path within the volume.
            tags: (List of String) Tags to associate with the action template.
            template: (String) Template content/definition.
            timeout: (String) Timeout for action execution (e.g., '5m', '10m').
            toleration_seconds: (Number) Toleration seconds for NoExecute effect.
            tolerations: (Block List) Tolerations for pod scheduling on tainted nodes. (see below for nested schema)
            type: '(String) Type of the action template. Valid values: delay, customScript, container.'
            updated_at: (Number) Last update timestamp (Unix epoch).
            updated_by: (String) User who last updated the action template.
            value: (String) Environment variable value.
            variables: (Block List) Template variables that can be used in the action. (see below for nested schema)
            verbosity: (String) Verbosity level for logging.
            volume_mounts: (Block List) Volume mounts for the container. (see below for nested schema)
            volumes: (Block List) Volumes to attach to the pod. (see below for nested schema)
        importStatements:
            - "# Example 1: Import Project-level Action Template\n# Format: org_id/project_id/hub_identity/template_identity\nterraform import harness_chaos_action_template.example \\\n  my_org/my_project/my-chaos-hub/delay-action-template\n\n# Example 2: Import Org-level Action Template  \n# Format: org_id/hub_identity/template_identity\nterraform import harness_chaos_action_template.org_example \\\n  my_org/org-chaos-hub/org-script-action\n\n# Example 3: Import Account-level Action Template\n# Format: hub_identity/template_identity\nterraform import harness_chaos_action_template.account_example \\\n  account-chaos-hub/account-delay-action"
    harness_chaos_experiment:
        subCategory: Next Gen
        description: Resource for creating chaos experiments from experiment templates.
        name: harness_chaos_experiment
        title: harness_chaos_experiment Resource - terraform-provider-harness
        examples:
            - name: basic
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_experiment_template.my_template}",
                    "${harness_chaos_infrastructure_v2.my_infra}"
                  ],
                  "description": "Basic chaos experiment with REFERENCE import",
                  "hub_identity": "my-chaos-hub",
                  "hub_org_id": "my_org",
                  "hub_project_id": "my_project",
                  "identity": "my-chaos-experiment",
                  "import_type": "REFERENCE",
                  "infra_ref": "my-env/my-infra",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${tags}"
                      ]
                    }
                  ],
                  "name": "My Chaos Experiment",
                  "org_id": "my_org",
                  "project_id": "my_project",
                  "tags": [
                    "chaos",
                    "kubernetes",
                    "resilience"
                  ],
                  "template_identity": "my-template"
                }
              references:
                lifecycle.ignore_changes: tags
            - name: local_copy
