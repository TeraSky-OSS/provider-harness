    harness_platform_infra_variable_set:
        subCategory: Next Gen
        description: Resource for managing Variable Sets
        name: harness_platform_infra_variable_set
        title: harness_platform_infra_variable_set Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "connector": [
                    {
                      "connector_ref": "harness_platform_connector_aws.test.id",
                      "type": "aws"
                    },
                    {
                      "connector_ref": "harness_platform_connector_azure.test.id",
                      "type": "azure"
                    }
                  ],
                  "description": "some description",
                  "environment_variable": [
                    {
                      "key": "key1",
                      "value": "value1",
                      "value_type": "string"
                    },
                    {
                      "key": "key2",
                      "value": "harness_platform_secret_text.test.id",
                      "value_type": "secret"
                    }
                  ],
                  "identifier": "example",
                  "name": "example",
                  "org_id": "${harness_platform_organization.test.id}",
                  "project_id": "${harness_platform_project.test.id}",
                  "terraform_variable": [
                    {
                      "key": "key1",
                      "value": "1111",
                      "value_type": "string"
                    },
                    {
                      "key": "key2",
                      "value": "1111u",
                      "value_type": "string"
                    }
                  ],
                  "terraform_variable_file": [
                    {
                      "repository": "https://github.com/org/repo",
                      "repository_branch": "main",
                      "repository_connector": "harness_platform_connector_github.test.id",
                      "repository_path": "tf/aws/basic"
                    },
                    {
                      "repository": "https://github.com/org/repo",
                      "repository_branch": "br2",
                      "repository_connector": "harness_platform_connector_github.test.id",
                      "repository_path": "tf/aws/basic"
                    }
                  ]
                }
              references:
                org_id: harness_platform_organization.test.id
                project_id: harness_platform_project.test.id
        argumentDocs:
            connector: (Block Set) Provider connectors configured on the Variable Set. Only one connector of a type is supported (see below for nested schema)
            connector_ref: (String) Connector Ref is the reference to the connector
            description: (String) Description of the resource.
            environment_variable: (Block Set) Environment variables configured on the Variable Set (see below for nested schema)
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            key: (String) Key is the identifier for the variable. Must be unique within the Variable Set.
            name: (String) Name of the resource.
            org_id: (String) Unique identifier of the organization.
            project_id: (String) Unique identifier of the project.
            repository: (String) Repository is the name of the repository to fetch the code from.
            repository_branch: (String) Repository branch is the name of the branch to fetch the variables from. This cannot be set if repository commit or sha is set
            repository_commit: (String) Repository commit is tag to fetch the variables from. This cannot be set if repository branch or sha is set.
            repository_connector: (String) Repository connector is the reference to the connector used to fetch the variables.
            repository_path: (String) Repository path is the path in which the variables reside.
            repository_sha: (String) Repository commit is SHA to fetch the variables from. This cannot be set if repository branch or commit is set.
            tags: (Set of String) Tags to associate with the resource.
            terraform_variable: (Block Set) Terraform variables configured on the Variable Set. Terraform variable keys must be unique within the Variable Set. (see below for nested schema)
            terraform_variable_file: (Block Set) Terraform variables files configured on the Variable Set (see below for nested schema)
            type: '(String) Type is the connector type of the connector. Supported types: aws, azure, gcp'
            value: (String) Value is the value of the variable. For string value types this field should contain the value of the variable. For secret value types this should contain a reference to a valid harness secret.
            value_type: (String) Value type indicates the value type of the variable. Currently we support string and secret.
        importStatements:
            - |-
              # Import account level variable set
              terraform import harness_platform_infra_variable_set.example <variable_set_id>

              # Import org level variable set
              terraform import harness_platform_infra_variable_set.example <ord_id>/<variable_set_id>

              # Import project level variable set
              terraform import harness_platform_secret_text.example <org_id>/<project_id>/<variable_set_id>
    harness_platform_infrastructure:
        subCategory: Next Gen
        description: Resource for creating a Harness Infrastructure.
        name: harness_platform_infrastructure
        title: harness_platform_infrastructure Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "deployment_type": "Kubernetes",
                  "env_id": "environmentIdentifier",
                  "git_details": [
                    {
                      "branch_name": "branchName",
                      "commit_message": "commitMessage",
                      "connector_ref": "connectorRef",
                      "file_path": "filePath",
                      "repo_name": "repoName",
                      "store_type": "REMOTE"
                    }
                  ],
                  "identifier": "identifier",
                  "name": "name",
                  "org_id": "orgIdentifer",
                  "project_id": "projectIdentifier",
                  "type": "KubernetesDirect",
                  "yaml": "infrastructureDefinition:\n name: name\n identifier: identifier\n description: \"\"\n tags:\n   asda: \"\"\n orgIdentifier: orgIdentifer\n projectIdentifier: projectIdentifier\n environmentRef: environmentIdentifier\n deploymentType: Kubernetes\n type: KubernetesDirect\n spec:\n  connectorRef: account.gfgf\n  namespace: asdasdsa\n  releaseName: release-\u003c+INFRA_KEY\u003e\n  allowSimultaneousDeployments: false\n"
                }
        argumentDocs:
            base_branch: (String) Name of the default branch (this checks out a new branch titled by branch_name).
            branch: (String) Name of the branch.
            commit_message: (String) Commit message used for the merge commit.
            connector_ref: '(String) Identifier of the Harness Connector used for CRUD operations on the Entity. To reference a connector at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference a connector at the account scope, prefix ''account` to the expression: account.{identifier}.'
            deployment_type: (String) Infrastructure deployment type. Valid values are Kubernetes, NativeHelm, Ssh, WinRm, ServerlessAwsLambda, AzureWebApp, Custom, ECS, GoogleManagedInstanceGroup.
            description: (String) Description of the resource.
            env_id: (String) Environment Identifier.
            file_path: (String) File path of the Entity in the repository.
            force_delete: (Boolean) Enable this flag for force deletion of infrastructure
            git_details: '(Block List, Max: 1) Contains parameters related to creating an Entity for Git Experience. (see below for nested schema)'
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            import_from_git: (Boolean) import infrastructure from git
            is_force_import: (Boolean) force import infrastructure from remote even if same file path already exist
            is_harnesscode_repo: (Boolean) If the gitProvider is HarnessCode
            is_new_branch: (Boolean) If a new branch creation is requested.
            last_commit_id: (String) Last commit identifier (for Git Repositories other than Github). To be provided only when updating infrastructure.
            last_object_id: (String) Last object identifier (for Github). To be provided only when updating infrastructure.
            load_from_cache: (String) If the Entity is to be fetched from cache
            load_from_fallback_branch: (Boolean) If the Entity is to be fetched from fallbackBranch
            name: (String) Name of the resource.
            org_id: (String) Unique identifier of the organization.
            parent_entity_connector_ref: '(String) Identifier of the Harness Connector used for CRUD operations on the Parent Entity. To reference a connector at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference a connector at the account scope, prefix ''account` to the expression: account.{identifier}.'
            parent_entity_repo_name: (String) Name of the repository where parent entity lies.
            project_id: (String) Unique identifier of the project.
            repo_name: (String) Name of the repository.
            store_type: '(String) Specifies whether the Entity is to be stored in Git or not. Possible values: INLINE, REMOTE.'
            tags: (Set of String) Tags to associate with the resource.
            type: (String) Type of Infrastructure. Valid values are KubernetesDirect, KubernetesGcp, ServerlessAwsLambda, Pdc, KubernetesAzure, SshWinRmAzure, SshWinRmAws, AzureWebApp, ECS, GitOps, CustomDeployment, TAS, KubernetesRancher, AWS_SAM, GoogleManagedInstanceGroup.
            yaml: '(String) Infrastructure YAML. In YAML, to reference an entity at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference an entity at the account scope, prefix ''account` to the expression: account.{identifier}. For eg, to reference a connector with identifier ''connectorId'' at the organization scope in a stage mention it as connectorRef: org.connectorId.'
        importStatements:
            - |-
              # Import account level infrastructure
              terraform import harness_platform_infrastructure.example <env_id>/<infrastructure_id>

              # Import org level infrastructure
              terraform import harness_platform_infrastructure.example <org_id>/<env_id>/<infrastructure_id>

              # Import project level infrastructure
              terraform import harness_platform_infrastructure.example <org_id>/<project_id>/<env_id>/<infrastructure_id>
    harness_platform_input_set:
        subCategory: Next Gen
        description: Resource for creating a Harness InputSet.
