                          "name": "action-stage",
                          "start": [
                            {
                              "actions": [
                                {
                                  "name": "start-notification"
                                }
                              ]
                            }
                          ]
                        },
                        {
                          "end": [
                            {}
                          ],
                          "name": "fault-stage",
                          "start": [
