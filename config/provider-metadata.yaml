                    "foo:bar"
                  ],
                  "yaml": "inputSet:\n  identifier: \"identifier\"\n  name: \"name\"\n  tags:\n    foo: \"bar\"\n  orgIdentifier: \"org_id\"\n  projectIdentifier: \"project_id\"\n  pipeline:\n    identifier: \"pipeline_id\"\n    variables:\n    - name: \"key\"\n      type: \"String\"\n      value: \"value\"\n"
                }
            - name: test
              manifest: |-
                {
                  "git_details": [
                    {
