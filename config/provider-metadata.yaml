    harness_platform_idp_catalog_entity:
        subCategory: Next Gen
        description: Resource for creating IDP catalog entities.
        name: harness_platform_idp_catalog_entity
        title: harness_platform_idp_catalog_entity Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "identifier": "identifier",
                  "kind": "component",
                  "yaml": "apiVersion: harness.io/v1\nkind: Component\nname: Example Catalog\nidentifier: \"%[1]s\"\ntype: service\nowner: user:account/admin@harness.io\nspec:\n    lifecycle: prod\nmetadata:\n    tags:\n        - test\n"
                }
            - name: test
              manifest: |-
                {
                  "identifier": "identifier",
                  "kind": "component",
                  "org_id": "org_id",
                  "yaml": "apiVersion: harness.io/v1\nkind: Component\nname: Example Catalog\nidentifier: \"identifier\"\norgIdentifier: org_id\ntype: service\nowner: user:account/admin@harness.io\nspec:\n    lifecycle: prod\nmetadata:\n    tags:\n        - test\n"
                }
            - name: test
              manifest: |-
                {
                  "identifier": "identifier",
                  "kind": "component",
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "yaml": "apiVersion: harness.io/v1\nkind: Component\nname: Example Catalog\nidentifier: \"identifier\"\norgIdentifier: org_id\nprojectIdentifier: project_id\ntype: service\nowner: user:account/admin@harness.io\nspec:\n    lifecycle: prod\nmetadata:\n    tags:\n        - test\n"
                }
            - name: test_with_git_experience
              manifest: |-
                {
                  "git_details": [
                    {
                      "branch_name": "main",
                      "file_path": "path/to/file.yaml",
                      "repo_name": "repo_name",
                      "store_type": "REMOTE"
                    }
                  ],
                  "identifier": "identifier",
                  "kind": "component",
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "yaml": "apiVersion: harness.io/v1\nkind: Component\nname: Example Catalog\nidentifier: \"identifier\"\norgIdentifier: org_id\nprojectIdentifier: project_id\ntype: service\nowner: user:account/admin@harness.io\nspec:\n    lifecycle: prod\nmetadata:\n    tags:\n        - test\n"
                }
            - name: test_with_git_import
              manifest: |-
                {
                  "git_details": [
                    {
                      "branch_name": "main",
                      "file_path": "path/to/file.yaml",
                      "repo_name": "repo_name",
                      "store_type": "REMOTE"
                    }
                  ],
                  "identifier": "identifier",
                  "import_from_git": true,
                  "org_id": "org_id",
                  "project_id": "project_id"
                }
        argumentDocs:
            base_branch: (String) Name of the default branch (this checks out a new branch titled by branch_name).
            branch_name: (String) Name of the branch.
            commit_message: (String) Commit message used for the merge commit.
            connector_ref: '(String) Identifier of the Harness Connector used for importing entity from Git To reference a connector at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference a connector at the account scope, prefix ''account` to the expression: account.{identifier}.'
            file_path: (String) File path of the Entity in the repository.
            git_details: '(Block List, Max: 1) Contains Git Information for importing entities from Git (see below for nested schema)'
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            import_from_git: (Boolean) Flag to set if importing from Git
            is_harness_code_repo: (Boolean) If the repo is a Harness Code repo
            kind: (String) Kind of the catalog entity
            last_commit_id: (String) Last commit identifier (for Git Repositories other than Github). To be provided only when updating Pipeline.
            last_object_id: (String) Last object identifier (for Github). To be provided only when updating Pipeline.
            org_id: (String) Unique identifier of the organization.
            project_id: (String) Unique identifier of the project.
            repo_name: (String) Name of the repository.
            store_type: '(String) Specifies whether the Entity is to be stored in Git or not. Possible values: INLINE, REMOTE.'
            yaml: (String) YAML definition of the catalog entity
        importStatements:
            - |-
              # Import account level entity
              terraform import harness_platform_idp_catalog_entity.example <entity_id>

              # Import org level entity
              terraform import harness_platform_idp_catalog_entity.example <org_id>/<entity_id>

              # Import project level entity
              terraform import harness_platform_idp_catalog_entity.example <org_id>/<project_id>/<entity_id>
