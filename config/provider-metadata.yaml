          metricName = \"New Relic Metric\"\n              },\n              {\n                \"type\" = \"FailImmediately\",\n                \"spec\" = {\n                  \"action\" = \"FailAfterOccurrence\",\n                  \"spec\" = {\n                    \"count\" : 2\n                  }\n                },\n                \"criteria\" = {\n                  \"type\" = \"Absolute\",\n                  \"spec\" = {\n                    \"greaterThan\" : 100\n                  }\n                },\n                \"metricType\" = \"Custom\",\n                \"metricName\" = \"New Relic Metric\"\n              }\n            ]\n          }\n        ]\n      })}",
