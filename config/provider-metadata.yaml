    harness_platform_triggers:
        subCategory: Next Gen
        description: Resource for creating triggers in Harness.
        name: harness_platform_triggers
        title: harness_platform_triggers Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "identifier": "identifier",
                  "name": "name",
                  "org_id": "orgIdentifer",
                  "project_id": "projectIdentifier",
                  "target_id": "pipelineIdentifier",
                  "yaml": "trigger:\n  name: name\n  identifier: identifier\n  enabled: true\n  description: \"\"\n  tags: {}\n  projectIdentifier: projectIdentifier\n  orgIdentifier: orgIdentifer\n  pipelineIdentifier: pipelineIdentifier\n  source:\n    type: Webhook\n    spec:\n      type: Github\n      spec:\n        type: Push\n        spec:\n          connectorRef: account.TestAccResourceConnectorGithub_Ssh_IZBeG\n          autoAbortPreviousExecutions: false\n          payloadConditions:\n          - key: changedFiles\n            operator: Equals\n            value: value\n          - key: targetBranch\n            operator: Equals\n            value: value\n          headerConditions: []\n          repoName: repoName\n          actions: []\n  inputYaml: |\n    pipeline: {}\\n\n"
                }
        argumentDocs:
            description: (String) Description of the resource.
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            if_match: (String) if-Match
            ignore_error: (Boolean) ignore error default false
            name: (String) Name of the resource.
            org_id: (String) Unique identifier of the organization.
            project_id: (String) Unique identifier of the project.
            tags: (Set of String) Tags to associate with the resource.
            target_id: (String) Identifier of the target pipeline
            webhook_url: (String) webhook url
            yaml: '(String) trigger yaml. In YAML, to reference an entity at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference an entity at the account scope, prefix ''account` to the expression: account.{identifier}. For eg, to reference a connector with identifier ''connectorId'' at the organization scope in a stage mention it as connectorRef: org.connectorId.'
        importStatements:
            - "# Import trigger \nterraform import harness_platform_triggers.example <org_id>/<project_id>/<target_id>/<triggers_id>"
    harness_platform_user:
