    harness_platform_feature_flag:
        subCategory: Next Gen
        description: Resource for managing Feature Flags.
        name: harness_platform_feature_flag
        title: harness_platform_feature_flag Resource - terraform-provider-harness
        examples:
            - name: mybooleanflag
              manifest: |-
                {
                  "default_off_variation": "Disabled",
                  "default_on_variation": "Enabled",
                  "environment": [
                    {
                      "identifier": "MY_ENVIRONMENT"
                    }
                  ],
                  "identifier": "MY_FEATURE",
                  "kind": "boolean",
                  "name": "MY_FEATURE",
                  "org_id": "test",
                  "permanent": false,
                  "project_id": "testff",
                  "tags": [
                    {
                      "identifier": "mytag"
                    }
                  ],
                  "variation": [
                    {
                      "description": "The feature is enabled",
                      "identifier": "Enabled",
                      "name": "Enabled",
                      "value": "true"
                    },
                    {
                      "description": "The feature is disabled",
                      "identifier": "Disabled",
                      "name": "Disabled",
                      "value": "false"
                    }
                  ]
                }
            - name: mymultivariateflag
              manifest: |-
                {
                  "default_off_variation": "trial20",
                  "default_on_variation": "trial7",
                  "identifier": "FREE_TRIAL_DURATION",
                  "kind": "int",
                  "name": "FREE_TRIAL_DURATION",
                  "org_id": "test",
                  "permanent": false,
                  "project_id": "testff",
                  "variation": [
                    {
                      "description": "Free trial period 7 days",
                      "identifier": "trial7",
                      "name": "7 days trial",
                      "value": "7"
                    },
                    {
                      "description": "Free trial period 14 days",
                      "identifier": "trial14",
                      "name": "14 days trial",
                      "value": "14"
                    },
                    {
                      "description": "Free trial period 20 days",
                      "identifier": "trial20",
                      "name": "20 days trial",
                      "value": "20"
                    }
                  ]
                }
            - name: mymultivariateflag
              manifest: |-
                {
                  "default_off_variation": "trial20",
                  "default_on_variation": "trial7",
                  "environment": [
                    {
                      "add_target_rule": [
                        {
                          "targets": [
                            "targets1",
                            "targets2"
                          ],
                          "variation": "trial14"
                        }
                      ],
                      "identifier": "MY_ENVIRONMENT"
                    }
                  ],
                  "identifier": "FREE_TRIAL_DURATION",
                  "kind": "int",
                  "name": "FREE_TRIAL_DURATION",
                  "org_id": "test",
                  "permanent": false,
                  "project_id": "testff",
                  "variation": [
                    {
                      "description": "Free trial period 7 days",
                      "identifier": "trial7",
                      "name": "7 days trial",
                      "value": "7"
                    },
                    {
                      "description": "Free trial period 14 days",
                      "identifier": "trial14",
                      "name": "14 days trial",
                      "value": "14"
                    },
                    {
                      "description": "Free trial period 20 days",
                      "identifier": "trial20",
                      "name": "20 days trial",
                      "value": "20"
                    }
                  ]
                }
            - name: mymultivariateflag
              manifest: |-
                {
                  "default_off_variation": "trial20",
                  "default_on_variation": "trial7",
                  "environment": [
                    {
                      "add_target_groups_rule": [
                        {
                          "distribution": {
                            "variations": [
                              {
                                "variation": "trial7",
                                "weight": 30
                              },
                              {
                                "variation": "trial14",
                                "weight": 30
                              },
                              {
                                "variation": "trial20",
                                "weight": 40
                              }
                            ]
                          },
                          "group_name": "group_name",
                          "variation": "trial14"
                        }
                      ],
                      "identifier": "MY_ENVIRONMENT"
                    }
                  ],
                  "identifier": "FREE_TRIAL_DURATION",
                  "kind": "int",
                  "name": "FREE_TRIAL_DURATION",
                  "org_id": "test",
                  "permanent": false,
                  "project_id": "testff",
                  "variation": [
                    {
                      "description": "Free trial period 7 days",
                      "identifier": "trial7",
                      "name": "7 days trial",
                      "value": "7"
                    },
                    {
                      "description": "Free trial period 14 days",
                      "identifier": "trial14",
                      "name": "14 days trial",
                      "value": "14"
                    },
                    {
                      "description": "Free trial period 20 days",
                      "identifier": "trial20",
                      "name": "20 days trial",
                      "value": "20"
                    }
                  ]
                }
        argumentDocs:
            add_target_rule: (Block List) The targeting rules for the flag (see below for nested schema)
            archived: (Boolean) Whether or not the flag is archived.
            default_off_variation: (String) Which of the variations to use when the flag is toggled to off state
            default_on_variation: (String) Which of the variations to use when the flag is toggled to on state
            description: (String) Description of the Feature Flag
            environment: (Block List) Environment Identifier (see below for nested schema)
            id: (String) The ID of this resource.
            identifier: (String) Identifier of the Feature Flag
            kind: (String) The type of data the flag represents. Valid values are boolean, int, string, json
            name: (String) Name of the Feature Flag
            org_id: (String) Organization Identifier
            owner: (String) The owner of the flag
            permanent: (Boolean) Whether or not the flag is permanent. If it is, it will never be flagged as stale
            project_id: (String) Project Identifier
            state: (String) State of the flag in this environment. Possible values are 'on' and 'off'
            tags: (Block List) The tags for the flag (see below for nested schema)
            targets: (List of String) The targets that should be served this variation
            value: (String) The value of the variation
            variation: '(Block List, Min: 2) The options available for your flag (see below for nested schema)'
        importStatements: []
