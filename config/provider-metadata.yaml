                    {
                      "include_all_resources": false,
                      "resources": [
                        {
                          "identifiers": [
                            "pipeline_a",
                            "pipeline_b"
                          ],
                          "resource_type": "PIPELINE"
                        }
                      ]
                    }
                  ]
                }
            - name: all_resources_account
              manifest: |-
                {
                  "account_id": "account_id",
                  "allowed_scope_levels": [
                    "account"
                  ],
                  "description": "Includes all resources at the account scope",
                  "identifier": "all_resources_account",
                  "included_scopes": [
                    {
                      "account_id": "account_id",
                      "filter": "EXCLUDING_CHILD_SCOPES"
                    }
                  ],
                  "name": "All Resources - Account Level",
                  "resource_filter": [
                    {
                      "include_all_resources": true
                    }
                  ]
                }
            - name: dynamic_example
              manifest: |-
                {
                  "account_id": "account_id",
                  "allowed_scope_levels": [
                    "account"
                  ],
                  "identifier": "dynamic_rg",
                  "included_scopes": [
                    {
                      "account_id": "account_id",
                      "filter": "INCLUDING_CHILD_SCOPES"
                    }
                  ],
                  "name": "Dynamic Resource Group",
                  "resource_filter": [
                    {
                      "include_all_resources": false,
                      "resources": [
                        {
                          "resource_type": "PIPELINE"
                        }
                      ]
                    }
                  ]
                }
        argumentDocs:
            EXCLUDING_CHILD_SCOPES: |-
                Includes only the explicitly specified scope.
                Example: Account only (does not automatically include its organizations or projects).
            INCLUDING_CHILD_SCOPES: |-
                Includes the specified scope and all nested child scopes.
                Example: Account plus all organizations and projects under it.
            category: |-
                , supported values include:
                ARTIFACTORY, CLOUD_COST, CLOUD_PROVIDER, CODE_REPO, MONITORING, SECRET_MANAGER, TICKETING
            "false": – Includes only the resources explicitly defined under resources.
            included_scopes: )
            included_scopes.account_id: → Account-level scope
            labels: |-
                , use the format:
                label:value
            resource_filter: )
            resources.attribute_filter: (optional rule-based filtering)
            resources.identifiers: '(optional explicit allowlist):'
            resources.resource_type: (required)
            tag: or tags
            "true": – Includes all resources within the defined scopes.
            type: |-
                , supported values include:
                Production, PreProduction
        importStatements:
            - |-
              # Import account level resource group
              terraform import harness_platform_resource_group.example <resource_group_id>
              # Import org level resource group
              terraform import harness_platform_resource_group.example <ord_id>/<resource_group_id>
              # Import project level resource group
              terraform import harness_platform_resource_group.example <org_id>/<project_id>/<resource_group_id>
