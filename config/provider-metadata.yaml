            infra_namespace: (String) Namespace where the infrastructure is installed.
            infra_scope: '(String) Scope of the infrastructure. Valid values: NAMESPACE, CLUSTER'
            infra_type: '(String) Type of the infrastructure. Valid values: KUBERNETES, KUBERNETESV2'
            insecure_skip_verify: (Boolean) Skip TLS verification for the infrastructure.
            install_command: (String) Installation command for the infrastructure.
            is_default: (Boolean) Whether this is the default registry.
            is_override_allowed: (Boolean) Whether override is allowed for this registry.
            is_private: (Boolean) Whether the registry is private.
            k8s_connector_id: (String) Kubernetes connector identifier.
            key: (String) Variable name from a ConfigMap or Secret. Required when value_from is configMapKeyRef or secretKeyRef.
            key_path: (String) Path to the private key file for mTLS
            label: (Map of String) Labels to apply to the infrastructure pods.
            log_watcher: (String) Custom image for log-watcher.
            mount_path: (String) Path within the container at which the volume should be mounted. Must not contain ':'.
            mount_propagation: (String) Determines how mounts are propagated from the host to container and the other way around. When not set, MountPropagationNone is used.
            mtls: '(Block List, Max: 1) mTLS configuration for the infrastructure. (see below for nested schema)'
            name: (String) Name of the infrastructure.
            namespace: (String) Kubernetes namespace where the infrastructure will be installed. Maps to the infrastructure namespace.
            no_proxy: (String) List of hosts that should not use proxy.
            node_selector: (Map of String) Node selector for the infrastructure pods.
            operator: (String) Operator represents a key's relationship to the value. Valid operators are Exists and Equal. Defaults to Equal.
            org_id: (String) The ID of the organization.
            org_identifier: (String)
            project_id: (String) The ID of the project.
            project_identifier: (String)
            proxy: '(Block List, Max: 1) Proxy configuration for the infrastructure. (see below for nested schema)'
            read_only: (Boolean) Mounted read-only if true, read-write otherwise.
            registry_account: (String) The account name for the container registry.
            registry_server: (String) The container image registry server URL (e.g., docker.io, gcr.io).
            run_as_group: (Number) Group ID to run the infrastructure as.
            run_as_user: (Number) User ID to run the infrastructure as.
            secret_name: (String) Name of the Kubernetes secret containing registry credentials.
            service_account: (String) Service account used by the infrastructure.
            size_limit: '(String) Size limit of the volume. Example: ''10Gi'', ''100Mi'''
            status: (String) Status of the infrastructure.
            sub_path: (String) Path within the volume from which the container's volume should be mounted. Mutually exclusive with sub_path_expr.
            sub_path_expr: (String) Expanded path within the volume from which the container's volume should be mounted. Behaves similarly to sub_path but environment variable references $(VAR_NAME) are expanded using the container's environment. Mutually exclusive with sub_path.
            tags: (List of String) Tags for the infrastructure.
            toleration_seconds: (Number) TolerationSeconds represents the period of time the toleration (which must be of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default, it is not set, which means tolerate the taint forever (do not evict). Zero and negative values will be treated as 0 (evict immediately) by the system.
            tolerations: (Block List) If specified, the pod's tolerations. (see below for nested schema)
            updated_at: (String) Last update timestamp.
            url: (String) URL for the mTLS endpoint
            use_custom_images: (Boolean) Whether to use custom images instead of default ones.
            value: '(String) Variable references $(VAR_NAME) are expanded using the container''s environment. If the variable cannot be resolved, the reference in the input string will be unchanged. The $(VAR_NAME) syntax can be escaped with a double $$, ie: $$(VAR_NAME). Escaped references will never be expanded, regardless of whether the variable exists or not. Defaults to "".'
            value_from: (String) Source for the environment variable's value. Cannot be used if value is not empty.
            volume_mounts: (Block List) Volume mounts for the container. (see below for nested schema)
            volumes: (Block List) Volumes to be created in the infrastructure. (see below for nested schema)
        importStatements:
            - |-
              # Import Project level Chaos Infrastructure v2
              terraform import harness_chaos_infrastructure_v2.example <org_id>/<project_id>/<environment_id>/<infra_id>
    harness_chaos_probe_template:
        subCategory: Next Gen
        description: Resource for managing Harness Chaos Probe Templates.
        name: harness_chaos_probe_template
        title: harness_chaos_probe_template Resource - terraform-provider-harness
        examples:
            - name: k8s_probe
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Kubernetes resource probe for deployment health",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "k8s-probe-template",
                  "infrastructure_type": "KubernetesV2",
                  "k8s_probe": [
                    {
                      "namespace": "\u003c+input\u003e.default('default')",
                      "operation": "present",
                      "resource": "deployments",
                      "version": "v1"
                    }
                  ],
                  "name": "K8s Probe Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "interval": "5s",
                      "stop_on_failure": false,
                      "timeout": "15s",
                      "verbosity": "INFO"
                    }
                  ],
                  "tags": [
                    "kubernetes",
                    "probe",
                    "health-check"
                  ],
                  "type": "k8sProbe",
                  "variables": [
                    {
                      "description": "Kubernetes namespace to probe",
                      "name": "target_namespace",
                      "required": false,
                      "type": "string",
                      "value": "\u003c+input\u003e"
                    }
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: http_probe
              manifest: |-
                {
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "HTTP endpoint health check",
                  "http_probe": [
                    {
                      "headers": [
                        {
                          "key": "Content-Type",
                          "value": "application/json"
                        },
                        {
                          "key": "Authorization",
                          "value": "\u003c+input\u003e"
                        }
                      ],
                      "method": "GET",
                      "url": "\u003c+input\u003e.default('http://localhost:8080/health')"
                    }
                  ],
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "http-probe-template",
                  "infrastructure_type": "KubernetesV2",
                  "name": "HTTP Probe Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "interval": "10s",
                      "polling_interval": "2s",
                      "stop_on_failure": true,
                      "timeout": "30s",
                      "verbosity": "INFO"
                    }
                  ],
                  "tags": [
                    "http",
                    "probe",
                    "endpoint"
                  ],
                  "type": "httpProbe",
                  "variables": [
                    {
                      "description": "HTTP endpoint URL to probe",
                      "name": "endpoint_url",
                      "required": true,
                      "type": "string",
                      "value": "\u003c+input\u003e"
                    }
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
            - name: cmd_probe
              manifest: |-
                {
                  "cmd_probe": [
                    {
                      "command": "kubectl get pods -n \u003c+input\u003e | grep Running",
                      "source": "inline"
                    }
                  ],
                  "depends_on": [
                    "${harness_chaos_hub_v2.project_level}"
                  ],
                  "description": "Command execution probe for custom checks",
                  "hub_identity": "${harness_chaos_hub_v2.project_level.identity}",
                  "identity": "cmd-probe-template",
                  "infrastructure_type": "KubernetesV2",
                  "name": "CMD Probe Template",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "run_properties": [
                    {
                      "interval": "5s",
                      "stop_on_failure": false,
                      "timeout": "20s",
                      "verbosity": "DEBUG"
                    }
                  ],
                  "tags": [
                    "cmd",
                    "probe",
                    "custom"
                  ],
                  "type": "cmdProbe",
                  "variables": [
                    {
                      "description": "Namespace to check for running pods",
                      "name": "check_namespace",
                      "required": false,
                      "type": "string",
                      "value": "\u003c+input\u003e.default('default')"
                    }
                  ]
                }
              references:
                hub_identity: harness_chaos_hub_v2.project_level.identity
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
        argumentDocs:
            account_id: (String) Account identifier.
            apm_probe: '(Block List, Max: 1) APM probe configuration. Required when type is ''apmProbe''. (see below for nested schema)'
            apm_type: '(String) APM provider type. Valid values: Prometheus, AppDynamics, SplunkObservability, Dynatrace, NewRelic, Datadog, GCPCloudMonitoring.'
            app_dynamics_inputs: '(Block List, Max: 1) AppDynamics-specific inputs. Required when apm_type is ''AppDynamics''. (see below for nested schema)'
            appd_metrics: '(Block List, Max: 1) AppDynamics metrics configuration. (see below for nested schema)'
            application_name: (String) AppDynamics application name.
            attempt: (Number) Number of attempts.
            auth: '(Block List, Max: 1) Authentication configuration. (see below for nested schema)'
            body: (String) POST request body.
            body_path: (String) Path to file containing POST body.
            ca_cert: (String) CA certificate.
            ca_cert_secret: (String) Harness secret identifier for CA certificate.
            client_cert: (String) Client certificate.
            client_cert_secret: (String) Harness secret identifier for client certificate.
            client_key: (String, Sensitive) Client key.
            client_key_secret: (String) Harness secret identifier for client key.
            cmd_probe: '(Block List, Max: 1) Command probe configuration. Required when type is ''cmdProbe''. (see below for nested schema)'
            command: (String) Command to execute.
            comparator: '(Block List, Max: 1) Comparator for APM metric validation. (see below for nested schema)'
            connector_id: (String) Harness connector ID for AppDynamics.
            content_type: (String) Content-Type header for POST request.
            criteria: (String) Comparison criteria (==, !=, <, >, <=, >=, contains, matches, notMatches, oneOf).
            datadog_inputs: '(Block List, Max: 1) Datadog-specific inputs. Required when apm_type is ''Datadog''. (see below for nested schema)'
            description: (String) Description of the probe template.
            duration_in_min: (Number) Duration in minutes for the AppDynamics query.
            dynatrace_inputs: '(Block List, Max: 1) Dynatrace-specific inputs. Required when apm_type is ''Dynatrace''. (see below for nested schema)'
            entity_selector: (String) Dynatrace entity selector.
            env: (Block List) Environment variables for the command. (see below for nested schema)
            field_selector: (String) Field selector for filtering resources.
            gcp_cloud_monitoring_inputs: '(Block List, Max: 1) GCP Cloud Monitoring-specific inputs. Required when apm_type is ''GCPCloudMonitoring''. (see below for nested schema)'
            get: '(Block List, Max: 1) GET method configuration. (see below for nested schema)'
            group: (String) API group (e.g., 'apps', 'batch').
            headers: (Map of String) HTTP headers.
            http_probe: '(Block List, Max: 1) HTTP probe configuration. Required when type is ''httpProbe''. (see below for nested schema)'
            hub_identity: (String) Identity of the chaos hub this probe template belongs to.
            hub_ref: (String) Hub reference.
            id: (String) The ID of this resource.
            identity: (String) Unique identifier for the probe template (immutable).
            infrastructure_type: '(String) Infrastructure type for the probe template. Valid values: Kubernetes, KubernetesV2, Windows, Linux, CloudFoundry, Container.'
            initial_delay: (String) Initial delay before probe execution (e.g., '5s', '1m').
            insecure_skip_verify: (Boolean) Skip TLS certificate verification.
            interval: (String) Interval between probe executions (e.g., '10s', '30s').
            is_default: (Boolean) Whether this is the default version for predefined probes.
            k8s_probe: '(Block List, Max: 1) Kubernetes probe configuration. Required when type is ''k8sProbe''. (see below for nested schema)'
            label_selector: (String) Label selector for filtering resources.
            method: '(Block List, Max: 1) HTTP method configuration with GET or POST. (see below for nested schema)'
            metrics: '(Block List, Max: 1) Dynatrace metrics configuration. (see below for nested schema)'
            metrics_full_path: (String) Full path to the AppDynamics metric.
            metrics_selector: (String) Dynatrace metrics selector.
            name: (String) Name of the probe template.
            namespace: (String) Kubernetes namespace.
            new_relic_inputs: '(Block List, Max: 1) NewRelic-specific inputs. Required when apm_type is ''NewRelic''. (see below for nested schema)'
            new_relic_metric: '(Block List, Max: 1) NewRelic metric configuration. (see below for nested schema)'
            operation: (String) Operation to perform (create, delete, present, absent, etc.).
            org_id: (String) Organization identifier.
            password: (String, Sensitive) Password for basic auth.
            polling_interval: (String) Polling interval for continuous probes (e.g., '2s', '5s').
            post: '(Block List, Max: 1) POST method configuration. (see below for nested schema)'
            project_id: (String) Project identifier.
            prometheus_inputs: '(Block List, Max: 1) Prometheus-specific inputs. Required when apm_type is ''Prometheus''. (see below for nested schema)'
            public_id: (String) Public ID of the Datadog Synthetics test.
            query: (String) Datadog query string.
            query_metric: (String) NewRelic query metric name.
            required: (Boolean) Whether the variable is required.
            resource: (String) Resource type (e.g., 'pods', 'deployments').
            resource_names: (String) Comma-separated list of resource names.
            response_body: (String) Expected response body.
            response_code: (String) Expected HTTP response code (e.g., '200', '404').
            retry: (Number) Number of retries.
            revision: (Number) Revision number of the probe template.
            run_properties: '(Block List, Max: 1) Run properties for the probe template execution. (see below for nested schema)'
            service_account_key: (String, Sensitive) GCP service account key (JSON).
            source: (String) Source of the command (inline, configMap, secret).
            splunk_observability_inputs: '(Block List, Max: 1) SplunkObservability-specific inputs. Required when apm_type is ''SplunkObservability''. (see below for nested schema)'
            splunk_observability_metrics: '(Block List, Max: 1) Splunk Observability metrics configuration. (see below for nested schema)'
            stop_on_failure: (Boolean) Whether to stop on failure.
            synthetics_test: '(Block List, Max: 1) Datadog Synthetics test configuration. (see below for nested schema)'
            tags: (List of String) Tags to associate with the probe template.
            test_type: (String) Type of Synthetics test (api, browser).
            timeout: (String) Timeout for probe execution (e.g., '30s', '5m').
            tls_config: '(Block List, Max: 1) TLS configuration for Prometheus connection. (see below for nested schema)'
            token: (String, Sensitive) Token for bearer auth.
            type: '(String) Type of the probe template. Valid values: httpProbe, cmdProbe, k8sProbe, promProbe, sloProbe, datadogProbe, dynatraceProbe, containerProbe, apmProbe.'
            url: (String) URL to probe.
            username: (String) Username for basic auth.
            value: (String) Expected value.
            variables: (Block List) Template variables that can be used in the probe. (see below for nested schema)
            verbosity: (String) Verbosity level for logging.
            version: (String) API version (e.g., 'v1', 'v1beta1').
        importStatements:
            - |-
              # Example 1: Import Project-level Probe Template
              # Format: org_id/project_id/hub_identity/template_identity
              terraform import harness_chaos_probe_template.example \
                my_org/my_project/my-chaos-hub/http-health-check

              # Example 2: Import Org-level Probe Template
              # Format: org_id/hub_identity/template_identity
              terraform import harness_chaos_probe_template.org_example \
                my_org/org-chaos-hub/org-http-probe

              # Example 3: Import Account-level Probe Template
              # Format: hub_identity/template_identity
              terraform import harness_chaos_probe_template.account_example \
                account-chaos-hub/account-k8s-probe
    harness_chaos_security_governance_condition:
        subCategory: Next Gen
        description: Resource for managing a Harness Chaos Security Governance Condition
        name: harness_chaos_security_governance_condition
        title: harness_chaos_security_governance_condition Resource - terraform-provider-harness
        examples:
            - name: k8s_condition
              manifest: |-
                {
                  "description": "Security governance condition for Kubernetes workloads",
                  "fault_spec": [
                    {
                      "faults": [
                        {
                          "fault_type": "FAULT",
                          "name": "pod-delete"
                        },
                        {
                          "fault_type": "FAULT",
                          "name": "pod-dns"
                        }
                      ],
                      "operator": "NOT_EQUAL_TO"
                    }
                  ],
                  "infra_type": "KubernetesV2",
                  "k8s_spec": [
                    {
                      "application_spec": [
                        {
                          "operator": "EQUAL_TO",
                          "workloads": [
                            {
                              "application_map_id": "nginx-app",
                              "kind": "deployment",
                              "label": "app=nginx",
                              "namespace": "default",
                              "services": [
                                "nginx-service"
                              ]
                            }
                          ]
                        }
                      ],
                      "chaos_service_account_spec": [
                        {
                          "operator": "EQUAL_TO",
                          "service_accounts": [
                            "default",
                            "chaos-service-account"
                          ]
                        }
                      ],
                      "infra_spec": [
                        {
                          "infra_ids": [
                            "${var.k8s_infra_id}"
                          ],
                          "operator": "EQUAL_TO"
                        }
                      ]
                    }
                  ],
                  "name": "k8s-security-condition",
                  "org_id": "${var.org_id}",
                  "project_id": "${var.project_id}",
                  "tags": [
                    "env:prod",
                    "team:security",
                    "platform:k8s"
                  ]
                }
              references:
                k8s_spec.infra_spec.infra_ids: var.k8s_infra_id
                org_id: var.org_id
                project_id: var.project_id
            - name: windows_condition
              manifest: |-
                {
                  "description": "Security governance condition for Windows hosts",
                  "fault_spec": [
                    {
                      "faults": [
                        {
                          "fault_type": "FAULT",
                          "name": "process-kill"
                        },
                        {
                          "fault_type": "FAULT",
                          "name": "cpu-hog"
                        }
                      ],
                      "operator": "NOT_EQUAL_TO"
                    }
                  ],
                  "infra_type": "Windows",
                  "machine_spec": [
                    {
                      "infra_spec": [
                        {
                          "infra_ids": [
                            "${var.windows_infra_id}"
                          ],
                          "operator": "EQUAL_TO"
                        }
                      ]
                    }
                  ],
                  "name": "windows-security-condition",
                  "org_id": "${var.org_id}",
                  "project_id": "${var.project_id}",
                  "tags": [
                    "env:prod",
                    "team:security",
                    "platform:windows"
                  ]
                }
              references:
                machine_spec.infra_spec.infra_ids: var.windows_infra_id
                org_id: var.org_id
                project_id: var.project_id
            - name: linux_condition
              manifest: |-
                {
                  "description": "Security governance condition for Linux hosts",
                  "fault_spec": [
                    {
                      "faults": [
                        {
                          "fault_type": "FAULT",
                          "name": "process-kill"
                        },
                        {
                          "fault_type": "FAULT",
                          "name": "memory-hog"
                        }
                      ],
                      "operator": "NOT_EQUAL_TO"
                    }
                  ],
                  "infra_type": "Linux",
                  "machine_spec": [
                    {
                      "infra_spec": [
                        {
                          "infra_ids": [
                            "${var.linux_infra_id}"
                          ],
                          "operator": "EQUAL_TO"
                        }
                      ]
                    }
                  ],
                  "name": "linux-security-condition",
                  "org_id": "${var.org_id}",
                  "project_id": "${var.project_id}",
                  "tags": [
                    "env:prod",
                    "team:security",
                    "platform:linux"
                  ]
                }
              references:
                machine_spec.infra_spec.infra_ids: var.linux_infra_id
                org_id: var.org_id
                project_id: var.project_id
        argumentDocs:
            application_map_id: (String) ID for the application map
            application_spec: '(Block List, Max: 1) Application specification (see below for nested schema)'
            chaos_service_account_spec: '(Block List, Max: 1) Chaos service account specification (see below for nested schema)'
            description: (String) Description of the security governance condition
            fault_spec: '(Block List, Min: 1, Max: 1) Specification for faults to be included in the condition (see below for nested schema)'
            fault_type: (String) Type of the fault (FAULT or FAULT_GROUP)
            faults: '(Block List, Min: 1) List of fault specifications (see below for nested schema)'
            id: (String) The ID of this resource.
            infra_ids: (List of String) List of infrastructure IDs to apply the condition to
            infra_spec: '(Block List, Max: 1) Infrastructure specification (see below for nested schema)'
            infra_type: (String) Type of infrastructure (Kubernetes, KubernetesV2, Linux, Windows, CloudFoundry, Container)
            k8s_spec: '(Block List, Max: 1) Kubernetes specific configuration (required when infra_type is KUBERNETES or KUBERNETESV2) (see below for nested schema)'
            kind: (String) Kind of the workload (e.g., deployment, statefulset)
            label: (String) Label selector for the workload
            machine_spec: '(Block List, Max: 1) Machine specific configuration (required when infra_type is LINUX or WINDOWS) (see below for nested schema)'
            name: (String) Name of the security governance condition
            namespace: (String) Namespace of the workload
            operator: (String) Operator for comparing faults (EQUAL_TO or NOT_EQUAL_TO)
            org_id: (String) The organization ID of the security governance condition
            project_id: (String) The project ID of the security governance condition
            service_accounts: (List of String) List of service accounts to include/exclude
            services: (List of String) List of services associated with the workload
            tags: (List of String) Tags for the security governance condition
            workloads: (Block List) List of workloads to include/exclude (see below for nested schema)
        importStatements:
            - |-
              # Import Project level Chaos Security Governance Condition
              terraform import harness_chaos_security_governance_condition.example org_id/project_id/condition_id
