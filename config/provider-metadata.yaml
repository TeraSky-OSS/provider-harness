name: harness/harness
resources:
    harness_add_user_to_group:
        subCategory: First Gen
        description: Resource for adding a user to a group.
        name: harness_add_user_to_group
        title: harness_add_user_to_group Resource - terraform-provider-harness
        examples:
            - name: example_add_user_to_groups
              manifest: |-
                {
                  "group_id": "${harness_user_group.admin.id}",
                  "user_id": "${data.harness_user.test.id}"
                }
              references:
                group_id: harness_user_group.admin.id
                user_id: data.harness_user.test.id
              dependencies:
                harness_user_group.admin: |-
                    {
                      "name": "admin"
                    }
        argumentDocs:
            group_id: (String) The name of the user.
            id: (String) The ID of this resource.
            user_id: (String) Unique identifier of the user.
        importStatements:
            - |-
              # Import using the Harness user and user group id
              terraform import harness_add_user_to_group.example_admin <user_id>/<group_id>
    harness_application:
        subCategory: First Gen
        description: Resource for creating a Harness application
        name: harness_application
        title: harness_application Resource - terraform-provider-harness
        examples:
            - name: myapp
              manifest: |-
                {
                  "description": "This is my first Harness application",
                  "name": "My Application",
                  "tags": [
                    "mytag:myvalue",
                    "team:development"
                  ]
                }
        argumentDocs:
            description: (String) The application description
            git_sync_connector_id: (String) The id of the git sync connector
            git_sync_enabled: (Boolean) True if git sync is enabled on this application
            id: (String) Unique identifier of the application
            is_manual_trigger_authorized: (Boolean) When this is set to true, all manual triggers will require API Key authorization
            name: (String) The name of the application
            tags: (Set of String) Tags to associate with the resource.
        importStatements:
            - |-
              # Import using the Harness application id
              terraform import harness_application.myapp Xyz123
    harness_application_gitsync:
        subCategory: First Gen
        description: Resource for configuring application git sync.
        name: harness_application_gitsync
        title: harness_application_gitsync Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "app_id": "${harness_application.example.id}",
                  "branch": "main",
                  "connector_id": "${harness_git_connector.myrepo.id}",
                  "enabled": false
                }
              references:
                app_id: harness_application.example.id
                connector_id: harness_git_connector.myrepo.id
              dependencies:
                harness_application.example: |-
                    {
                      "name": "example-app"
                    }
                harness_encrypted_text.github_token: |-
                    {
                      "name": "github_token",
                      "secret_manager_id": "${data.harness_secret_manager.default.id}",
                      "value": "\u003cTOKEN\u003e"
                    }
                harness_git_connector.myrepo: |-
                    {
                      "branch": "main",
                      "generate_webhook_url": true,
                      "name": "myrepo",
                      "password_secret_id": "${harness_encrypted_text.github_token.id}",
                      "url": "https://github.com/someorg/myrepo",
                      "url_type": "REPO",
                      "username": "someuser"
                    }
        argumentDocs:
            app_id: (String) The id of the application.
            branch: (String) The branch of the git repository to sync to.
            connector_id: (String) The id of the git connector to use.
            enabled: (Boolean) Whether or not to enable git sync.
            id: (String) The ID of this resource.
            repository_name: (String) The name of the git repository to sync to. This is only used if the git connector is for an account and not an individual repository.
        importStatements:
            - |-
              # Import using the Harness application id
              terraform import harness_application_gitsync.myapp Xyz123
    harness_autostopping_alert:
        subCategory: Next Gen
        description: Resource for creating and managing Harness AutoStopping alerts. Alerts notify users via email or Slack when events such as warmup failures, cooldown failures, or rule lifecycle changes occur.
        name: harness_autostopping_alert
        title: harness_autostopping_alert Resource - terraform-provider-harness
        examples:
            - name: specific-rule-alert
              manifest: |-
                {
                  "events": [
                    "autostopping_rule_created",
                    "autostopping_rule_updated",
                    "autostopping_rule_deleted",
                    "autostopping_warmup_failed",
                    "autostopping_cooldown_failed"
                  ],
                  "name": "demo-alert",
                  "recipients": [
                    {
                      "email": [
                        "user1@example.com",
                        "user2@example.com"
                      ],
                      "slack": [
                        "slack-web-hook-1",
                        "slack-web-hook-2"
                      ]
                    }
                  ],
                  "rule_id_list": [
                    1234
                  ]
                }
            - name: all-rule-alert
              manifest: |-
                {
                  "applicable_to_all_rules": true,
                  "events": [
                    "autostopping_rule_created",
                    "autostopping_rule_updated",
                    "autostopping_rule_deleted",
                    "autostopping_warmup_failed",
                    "autostopping_cooldown_failed"
                  ],
                  "name": "demo-alert",
                  "recipients": [
                    {
                      "email": [
                        "user1@example.com",
                        "user2@example.com"
                      ],
                      "slack": [
                        "slack-web-hook-1",
                        "slack-web-hook-2"
                      ]
                    }
                  ]
                }
        argumentDocs:
            applicable_to_all_rules: (Boolean) When true, the alert applies to all AutoStopping rules in the account (leave rule_id_list empty). Mutually exclusive with rule_id_list.
            email: (List of String) List of email addresses to notify. Required if slack is not set.
            enabled: (Boolean) Whether the alert is enabled.
            events: (List of String) List of event types that trigger the alert (e.g. autostopping_rule_created, autostopping_warmup_failed, autostopping_cooldown_failed).
            id: (String) The ID of this resource.
            name: (String) Name of the alert.
            recipients: '(Block List, Min: 1, Max: 1) Notification recipients. At least one of email or slack is required (with at least one value). (see below for nested schema)'
            rule_id_list: (List of Number) List of AutoStopping rule IDs to apply the alert to. Required when applicable_to_all_rules is false. Mutually exclusive with applicable_to_all_rules = true.
            slack: (List of String) List of Slack webhook URLs or channel identifiers to notify. Required if email is not set.
        importStatements: []
    harness_autostopping_aws_alb:
        subCategory: Next Gen
        description: Resource for creating an AWS application load balancer
        name: harness_autostopping_aws_alb
        title: harness_autostopping_aws_alb Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "cloud_connector_id": "cloud_connector_id",
                  "delete_cloud_resources_on_destroy": true,
                  "host_name": "host_name",
                  "name": "name",
                  "region": "region",
                  "security_groups": [
                    "sg1",
                    "sg2"
                  ],
                  "vpc": "vpc"
                }
            - name: harness_alb
              manifest: |-
                {
                  "alb_arn": "arn:aws:elasticloadbalancing:region:aws_account_id:loadbalancer/app/harness_alb/id",
                  "cloud_connector_id": "cloud_connector_id",
                  "delete_cloud_resources_on_destroy": false,
                  "host_name": "host.name",
                  "name": "harness_alb",
                  "region": "region",
                  "security_groups": [
                    "sg-0"
                  ],
                  "vpc": "vpc"
                }
        argumentDocs:
            alb_arn: (String) Arn of AWS ALB to be imported. Required only for importing existing ALB
            certificate_id: (String)
            cloud_connector_id: (String) Id of the cloud connector
            delete_cloud_resources_on_destroy: (Boolean) Governs how the loadabalancer entity will be deleted on Terraform destroy. When set to true, the associated ALB will be deleted permanently from AWS account. Be fully aware of the consequneces of settting this to true, as the action is irreversible. When set to false, solely the Harness LB representation will be deleted, leaving the cloud resources intact.
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource
            name: (String) Name of the proxy
            region: (String) Region in which cloud resources are hosted
            security_groups: (List of String) Security Group to define the security rules that determine the inbound and outbound traffic
            vpc: (String) VPC in which cloud resources are hosted
        importStatements: []
    harness_autostopping_aws_proxy:
        subCategory: Next Gen
        description: Resource for creating an AWS Autostopping proxy
        name: harness_autostopping_aws_proxy
        title: harness_autostopping_aws_proxy Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "allocate_static_ip": true,
                  "api_key": "",
                  "cloud_connector_id": "cloud_connector_id",
                  "delete_cloud_resources_on_destroy": true,
                  "machine_type": "t2.medium",
                  "name": "name",
                  "region": "region",
                  "security_groups": [
                    "sg1",
                    "sg2"
                  ],
                  "vpc": "vpc"
                }
        argumentDocs:
            allocate_static_ip: (Boolean) Boolean value to indicate if proxy vm needs to have static IP
            api_key: (String, Sensitive) Harness NG API key
            cert_secret_id: (String) Certificate secret ID
            certificates: '(Block List, Max: 1) (see below for nested schema)'
            cloud_connector_id: (String) Id of the cloud connector
            delete_cloud_resources_on_destroy: (Boolean) Governs how the proxy entity will be deleted on Terraform destroy. When set to true, the associated VM will be deleted permanently from AWS account. Be fully aware of the consequneces of settting this to true, as the action is irreversible. When set to false, solely the Harness LB representation will be deleted, which leaves the proxy VM in AWS account itself.
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource
            key_secret_id: (String) Private key secret ID
            keypair: (String)
            machine_type: (String) Machine instance type
            name: (String) Name of the proxy
            private_ip: (String) Private IP address of the proxy
            public_ip: (String) Public IP address of the proxy
            region: (String) Region in which cloud resources are hosted
            security_groups: (List of String) Security Group to define the security rules that determine the inbound and outbound traffic
            vpc: (String) VPC in which cloud resources are hosted
        importStatements: []
    harness_autostopping_azure_gateway:
        subCategory: Next Gen
        description: Resource for creating an Azure Application Gateway
        name: harness_autostopping_azure_gateway
        title: harness_autostopping_azure_gateway Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "azure_func_region": "westus2",
                  "cloud_connector_id": "cloud_connector_id",
                  "delete_cloud_resources_on_destroy": true,
                  "frontend_ip": "/subscriptions/subscription_id/resourceGroups/resource_group/providers/Microsoft.Network/publicIPAddresses/publicip",
                  "host_name": "host_name",
                  "name": "name",
                  "region": "eastus2",
                  "resource_group": "resource_group",
                  "sku_size": "sku2",
                  "subnet_id": "/subscriptions/subscription_id/resourceGroups/resource_group/providers/Microsoft.Network/virtualNetworks/virtual_network/subnets/subnet_id",
                  "vpc": "/subscriptions/subscription_id/resourceGroups/resource_group/providers/Microsoft.Network/virtualNetworks/virtual_network"
                }
            - name: import_test
              manifest: |-
                {
                  "app_gateway_id": "/subscriptions/subscription_id/resourceGroups/test_resource_group/providers/Microsoft.Network/applicationGateways/TestAppGateway",
                  "azure_func_region": "westus2",
                  "certificate_id": "/subscriptions/subscription_id/resourceGroups/test_resource_group/providers/Microsoft.Network/applicationGateways/TestAppGateway/sslCertificates/certificate_name",
                  "cloud_connector_id": "cloud_connector_id",
                  "delete_cloud_resources_on_destroy": false,
                  "host_name": "host_name",
                  "name": "import_test",
                  "region": "westus2",
                  "resource_group": "test_resource_group",
                  "vpc": "/subscriptions/subscription_id/resourceGroups/test_resource_group/providers/Microsoft.Network/virtualNetworks/test_resource_group_vnet"
                }
        argumentDocs:
            app_gateway_id: (String) ID of Azure AppGateway for importing. Required only for importing exiging AppGateway
            azure_func_region: (String) Region in which azure cloud function will be provisioned
            certificate_id: (String) ID of existing SSL certificate from AppGateway being imported. Required only for importing existing AppGateway. Required only for SSL based rules
            cloud_connector_id: (String) Id of the cloud connector
            delete_cloud_resources_on_destroy: (Boolean) Governs how the loadabalancer entity will be deleted on Terraform destroy. When set to true, the associated Application Gateway will be deleted permanently from Azure account. Be fully aware of the consequneces of settting this to true, as the action is irreversible. When set to false, solely the Harness LB representation will be deleted, leaving the cloud resources intact.
            frontend_ip: (String) ID of IP address to be used. Required only for creating new AppGateway. See https://learn.microsoft.com/en-us/azure/application-gateway/application-gateway-components#static-versus-dynamic-public-ip-address for more details
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource
            name: (String) Name of the proxy
            region: (String) Region in which cloud resources are hosted
            resource_group: (String) Resource group in which cloud resources are hosted
            sku_size: (String) Size of machine used for the gateway. Required only for creating new AppGateway
            subnet_id: (String) Subnet in which cloud resources are hosted. Required only for creating new AppGateway
            vpc: (String) VNet in which cloud resources are hosted. Required only for creating new AppGateway
        importStatements: []
