    harness_chaos_hub_v2:
        subCategory: Next Gen
        description: Resource for managing Harness Chaos Hub V2.
        name: harness_chaos_hub_v2
        title: harness_chaos_hub_v2 Resource - terraform-provider-harness
        examples:
            - name: account_level
              manifest: |-
                {
                  "description": "Account-level chaos hub for enterprise-wide templates",
                  "identity": "account-chaos-hub",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${tags}"
                      ]
                    }
                  ],
                  "name": "Account Chaos Hub",
                  "tags": [
                    "account",
                    "enterprise",
                    "chaos"
                  ]
                }
              references:
                lifecycle.ignore_changes: tags
            - name: org_level
              manifest: |-
                {
                  "depends_on": [
                    "${harness_platform_organization.this}"
                  ],
                  "description": "Org-level chaos hub for shared templates",
                  "identity": "org-chaos-hub",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${tags}"
                      ]
                    }
                  ],
                  "name": "Org Chaos Hub",
                  "org_id": "${harness_platform_organization.this.id}",
                  "tags": [
                    "org",
                    "shared",
                    "chaos"
                  ]
                }
              references:
                lifecycle.ignore_changes: tags
                org_id: harness_platform_organization.this.id
            - name: project_level
              manifest: |-
                {
                  "depends_on": [
                    "${harness_platform_project.this}"
                  ],
                  "description": "Project-level chaos hub for team templates",
                  "identity": "project-chaos-hub",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${tags}"
                      ]
                    }
                  ],
                  "name": "Project Chaos Hub",
                  "org_id": "${harness_platform_organization.this.id}",
                  "project_id": "${harness_platform_project.this.id}",
                  "tags": [
                    "project",
                    "team",
                    "chaos"
                  ]
                }
              references:
                lifecycle.ignore_changes: tags
                org_id: harness_platform_organization.this.id
                project_id: harness_platform_project.this.id
        argumentDocs:
            account_id: (String) Account ID.
            action_template_count: (Number) Number of action templates in the hub.
            connector_id: (String) Connector ID (deprecated, use connector_ref).
            connector_ref: '(String) Reference to the Git connector (format: scope.connectorId, e.g., org.myconnector or account.myconnector).'
            created_at: (Number) Creation timestamp (Unix epoch).
            created_by: (String) User who created the chaos hub.
            description: (String) Description of the chaos hub.
            experiment_template_count: (Number) Number of experiment templates in the hub.
            fault_template_count: (Number) Number of fault templates in the hub.
            hub_id: (String) Internal hub ID returned by the API.
            id: (String) The ID of this resource.
            identity: (String) Unique identifier for the chaos hub.
            is_default: (Boolean) Whether this is the default chaos hub.
            is_removed: (Boolean) Whether the chaos hub has been removed.
            last_synced_at: (Number) Timestamp of the last sync (Unix epoch).
            name: (String) Name of the chaos hub.
            org_id: (String) The ID of the organization.
            probe_template_count: (Number) Number of probe templates in the hub.
            project_id: (String) The ID of the project.
            repo_branch: (String) Git repository branch.
            repo_name: (String) Name of the Git repository (required for account-level connectors).
            repo_url: (String) Git repository URL.
            tags: (List of String) Tags to associate with the chaos hub.
            updated_at: (Number) Last update timestamp (Unix epoch).
            updated_by: (String) User who last updated the chaos hub.
        importStatements:
            - |-
              # Import Account level Chaos Hub
              terraform import harness_chaos_hub_v2.account_level <hub_id>

              # Import Org level Chaos Hub
              terraform import harness_chaos_hub_v2.org_level <org_id>/<hub_id>

              # Import Project level Chaos Hub
              terraform import harness_chaos_hub_v2.project_level <org_id>/<project_id>/<hub_id>
