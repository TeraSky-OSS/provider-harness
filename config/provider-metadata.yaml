    harness_platform_delegatetoken:
        subCategory: Next Gen
        description: Resource for creating delegate tokens. Delegate tokens can be created and revoked. Revoked tokens immediately stop functioning and are only purged after 30 days, meaning you cannot recreate a token with the same name within that period. To revoke a token, set token_status field to "REVOKED".
        name: harness_platform_delegatetoken
        title: harness_platform_delegatetoken Resource - terraform-provider-harness
        examples:
            - name: account_level
              manifest: |-
                {
                  "account_id": "account_id",
                  "name": "account-delegate-token"
                }
            - name: org_level
              manifest: |-
                {
                  "account_id": "account_id",
                  "name": "org-delegate-token",
                  "org_id": "org_id"
                }
            - name: project_level
              manifest: |-
                {
                  "account_id": "account_id",
                  "name": "project-delegate-token",
                  "org_id": "org_id",
                  "project_id": "project_id"
                }
            - name: expiry_token
              manifest: |-
                {
                  "account_id": "account_id",
                  "name": "expiry-delegate-token",
                  "revoke_after": 1769689600000
                }
        argumentDocs:
            account_id: (String) Account Identifier for the Entity
            created_at: (Number) Time when the delegate token is created. This is an epoch timestamp.
            created_by: (Map of String) created by details
            id: (String) The ID of this resource.
            name: (String) Name of the delegate token
            org_id: (String) Org Identifier for the Entity
            project_id: (String) Project Identifier for the Entity
            revoke_after: (Number) Epoch time in milliseconds after which the token will be marked as revoked. There can be a delay of up to one hour from the epoch value provided and actual revoking of the token.
            token_status: (String) Status of Delegate Token (ACTIVE or REVOKED). If left empty both active and revoked tokens will be assumed
            value: (String) Value of the delegate token. Encoded in base64.
        importStatements: []
    harness_platform_environment:
        subCategory: Next Gen
        description: Resource for creating a Harness environment.
        name: harness_platform_environment
        title: harness_platform_environment Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "git_details": [
                    {
                      "branch_name": "branchName",
                      "commit_message": "commitMessage",
                      "connector_ref": "connectorRef",
                      "file_path": "filePath",
                      "repo_name": "repoName",
                      "store_type": "REMOTE"
                    }
                  ],
                  "identifier": "identifier",
                  "name": "name",
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "tags": [
                    "foo:bar",
                    "bar:foo"
                  ],
                  "type": "PreProduction",
                  "yaml": "environment:\n   name: name\n   identifier: identifier\n   orgIdentifier: org_id\n   projectIdentifier: project_id\n   type: PreProduction\n   tags:\n     foo: bar\n     bar: foo\n   variables:\n     - name: envVar1\n       type: String\n       value: v1\n       description: \"\"\n     - name: envVar2\n       type: String\n       value: v2\n       description: \"\"\n   overrides:\n     manifests:\n       - manifest:\n           identifier: manifestEnv\n           type: Values\n           spec:\n             store:\n               type: Git\n               spec:\n                 connectorRef: \u003c+input\u003e\n                 gitFetchType: Branch\n                 paths:\n                   - file1\n                 repoName: \u003c+input\u003e\n                 branch: master\n     configFiles:\n       - configFile:\n           identifier: configFileEnv\n           spec:\n             store:\n               type: Harness\n               spec:\n                 files:\n                   - account:/Add-ons/svcOverrideTest\n                 secretFiles: []\n"
                }
            - name: test
              manifest: |-
                {
                  "git_details": [
                    {
                      "branch": "main",
                      "connector_ref": "account.DoNotDeleteGitX",
                      "file_path": ".harness/accountEnvironment.yaml",
                      "import_from_git": "true",
                      "repo_name": "pcf_practice",
                      "store_type": "REMOTE"
                    }
                  ],
                  "identifier": "accEnv",
                  "name": "accEnv",
                  "type": "PreProduction"
                }
        argumentDocs:
            base_branch: (String) Name of the default branch (this checks out a new branch titled by branch_name).
            branch: (String) Name of the branch.
            color: (String) Color of the environment.
            commit_message: (String) Commit message used for the merge commit.
            connector_ref: '(String) Identifier of the Harness Connector used for CRUD operations on the Entity. To reference a connector at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference a connector at the account scope, prefix ''account` to the expression: account.{identifier}.'
            description: (String) Description of the resource.
            file_path: (String) File path of the Entity in the repository.
            force_delete: (Boolean) Enable this flag for force deletion of environments
            git_details: '(Block List, Max: 1) Contains parameters related to creating an Entity for Git Experience. (see below for nested schema)'
            id: (String) The ID of this resource.
            identifier: (String) Unique identifier of the resource.
            import_from_git: (Boolean) import environment from git
            is_force_import: (Boolean) force import environment from remote even if same file path already exist
            is_harnesscode_repo: (Boolean) If the gitProvider is HarnessCode
            is_new_branch: (Boolean) If a new branch creation is requested.
            last_commit_id: (String) Last commit identifier (for Git Repositories other than Github). To be provided only when updating Pipeline.
            last_object_id: (String) Last object identifier (for Github). To be provided only when updating Pipeline.
            load_from_cache: (String) If the Entity is to be fetched from cache
            load_from_fallback_branch: (Boolean) If the Entity is to be fetched from fallbackBranch
            name: (String) Name of the resource.
            org_id: (String) Unique identifier of the organization.
            parent_entity_connector_ref: '(String) Identifier of the Harness Connector used for CRUD operations on the Parent Entity. To reference a connector at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference a connector at the account scope, prefix ''account` to the expression: account.{identifier}.'
            parent_entity_repo_name: (String) Name of the repository where parent entity lies.
            project_id: (String) Unique identifier of the project.
            repo_name: (String) Name of the repository.
            store_type: '(String) Specifies whether the Entity is to be stored in Git or not. Possible values: INLINE, REMOTE.'
            tags: (Set of String) Tags to associate with the resource.
            type: (String) The type of environment. Valid values are PreProduction, Production
            yaml: '(String) Environment YAML. In YAML, to reference an entity at the organization scope, prefix ''org'' to the expression: org.{identifier}. To reference an entity at the account scope, prefix ''account` to the expression: account.{identifier}. For eg, to reference a connector with identifier ''connectorId'' at the organization scope in a stage mention it as connectorRef: org.connectorId.'
        importStatements:
            - |-
              # Import account level environment id
              terraform import harness_platform_environment.example <environment_id>

              # Import org level environment id
              terraform import harness_platform_environment.example <org_id>/<environment_id>

              # Import project level environment id
              terraform import harness_platform_environment.example <org_id>/<project_id>/<environment_id>
