    harness_platform_gitops_applications:
        subCategory: Next Gen
        description: Resource for managing a Harness Gitops Application.
        name: harness_platform_gitops_applications
        title: harness_platform_gitops_applications Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "account_id": "account_id",
                  "agent_id": "agent_id",
                  "application": [
                    {
                      "metadata": [
                        {
                          "annotations": {},
                          "labels": {
                            "harness.io/envRef": "env_id",
                            "harness.io/serviceRef": "service_id"
                          },
                          "name": "appname123"
                        }
                      ],
                      "spec": [
                        {
                          "destination": [
                            {
                              "namespace": "namespace-123",
                              "server": "https://1.3.4.5"
                            }
                          ],
                          "source": [
                            {
                              "path": "helm-guestbook",
                              "repo_url": "https://github.com/willycoll/argocd-example-apps.git",
                              "target_revision": "master"
                            }
                          ],
                          "sync_policy": [
                            {
                              "sync_options": [
                                "PrunePropagationPolicy=undefined",
                                "CreateNamespace=false",
                                "Validate=false",
                                "skipSchemaValidations=false",
                                "autoCreateNamespace=false",
                                "pruneLast=false",
                                "applyOutofSyncOnly=false",
                                "Replace=false",
                                "retry=false"
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "cluster_id": "cluster_id",
                  "identifier": "identifier",
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "repo_id": "repo_id"
                }
        argumentDocs:
            account_id: (String, Deprecated) Account identifier of the GitOps application.
            agent_id: (String) Agent identifier of the GitOps application.
            allow_empty: '(Boolean) Indicates to allows apps to have zero live resources (default: false).'
            annotations: (Map of String) Annotations are unstructured key value pairs corresponding to a resource. External tools set these to store and retrieve arbitrary metadata.
            api_version: (String) API version of the referent.
            application: '(Block List, Min: 1, Max: 1) Definition of the GitOps application resource. (see below for nested schema)'
            automated: '(Block List, Max: 1) Controls the behavior of an automated sync. (see below for nested schema)'
            backoff: '(Block List, Max: 1) Backoff strategy to use on subsequent retries for failing syncs. (see below for nested schema)'
            block_owner_deletion: (Boolean) If true, AND if the owner has the "foregroundDeletion" finalizer, then the owner cannot be deleted from the key-value store until this reference is removed. Defaults to false. To set this field, a user needs "delete" permission of the owner, otherwise 422 (Unprocessable Entity) will be returned.
            chart: (String) Helm chart name, and must be specified for the GitOps applications sourced from a helm repo.
            cluster_id: (String) Cluster identifier of the GitOps application.
            cluster_name: (String) Name of the cluster corresponding to the object. API server ignores this if set in any create or update request.
            code: (Boolean) Code of the external variables of jsonnet application.
            common_annotations: (Map of String) List of additional annotations to add to rendered manifests.
            common_labels: (Map of String) List of additional labels to add to rendered manifests.
            component: (String) Component of the parameter of the ksonnet application.
            controller: (Boolean) Indicates if the reference points to the managing controller.
            destination: (Block List) Information about the GitOps application's destination. (see below for nested schema)
            directory: (Block List) Options for applications of type plain YAML or Jsonnet. (see below for nested schema)
            duration: (String) Amount to back off. Default unit is seconds, but could also be a duration (e.g. "2m", "1h").
            env: (Block List) Entry in the GitOps application's environment. (see below for nested schema)
            environment: (String) Ksonnet application environment name.
            exclude: (String) Glob pattern to match paths against that should be explicitly excluded from being used during manifest generation.
            ext_vars: (Block List) List of jsonnet external variables. (see below for nested schema)
            factor: (String) Factor to multiply the base duration after each failed retry.
            file_parameters: (Block List) File parameters to the helm template. (see below for nested schema)
            finalizers: (List of String) Before the object is removed from the register, it must be empty. Each element serves as a unique identifier for the component that is accountable for removing that entry from the list. Entries in this list can only be removed if the object's deletionTimestamp is not null. The processing and removal of finalizers can happen in any sequence. No order is enforced as it may block the finalizers. Finalizers is a shared field that can be reordered by any actor with authority. If the finalizer list is processed in order, this could result in a scenario where the component in charge of the list's first finalizer is waiting for a signal (generated by a field value, an external system, or another) produced by a component in charge of the list's later finalizer.
            force_common_annotations: (Boolean) Indicates if to force applying common annotations to resources for kustomize apps.
            force_common_labels: (Boolean) Indicates if to force apply common labels to resources for kustomize apps.
            force_string: (Boolean) Indicates if helm should interpret booleans and numbers as strings.
            generate_name: (String) An optional prefix that the server will only apply if the Name field is empty to create a unique name. The name returned to the client will differ from the name passed if this field is used. A unique suffix will be added to this value as well. The supplied value must adhere to the same validation guidelines as the Name field and may be reduced by the suffix length necessary to ensure that it is unique on the server. The server will NOT return a 409 if this field is supplied and the created name already exists; instead, it will either return 201 Created or 500 with Reason ServerTimeout, indicating that a unique name could not be found in the allotted time and the client should try again later.
            generation: (String) A sequence number representing a specific generation of the desired state. This is a read-only value populated by the system.
            helm: (Block List) Holds helm specific options. (see below for nested schema)
            id: (String) The ID of this resource.
            identifier: (String, Deprecated) Identifier of the GitOps application.
            ignore_missing_value_files: (Boolean) Prevents 'helm template' from failing when value_files do not exist locally.
            images: (List of String) List of kustomize image override specifications.
            include: (String) Glob pattern to match paths against that should be explicitly included during manifest generation.
            jsonnet: (Block List) Options specific to applications of type Jsonnet. (see below for nested schema)
            kind: (String) Kind of the GitOps application.
            ksonnet: (Block List) Ksonnet specific options. (see below for nested schema)
            kustomize: (Block List) Options specific to a GitOps application source specific to Kustomize. (see below for nested schema)
            labels: (Map of String) Map of string keys and values that can be used to organize and categorize (scope and select) objects. May match selectors of replication controllers and services.
            libs: (List of String) Additional library search dirs.
            limit: (String) Limit is the maximum number of attempts for retrying a failed sync. If set to 0, no retries will be performed.
            max_duration: (String) Maximum amount of time allowed of the backoff strategy.
            metadata: '(Block List, Min: 1, Max: 1) Metadata corresponding to the resources. This includes all the objects a user must create. (see below for nested schema)'
            name: (String) Name of the GitOps application.
            name_prefix: (String) Prefix prepended to resources for kustomize apps.
            name_suffix: (String) Suffix appended to resources for kustomize apps.
            namespace: (String) Namespace of the GitOps application. An empty namespace is equivalent to the namespace of the GitOps agent.
            options_remove_existing_finalizers: (Boolean) Options to remove existing finalizers to delete the GitOps application.
            org_id: (String) Organization identifier of the GitOps application.
            owner_references: (Block List) List of objects depended by this object. If ALL objects in the list have been deleted, this object will be garbage collected. If this object is managed by a controller, then an entry in this list will point to this controller, with the controller field set to true. There cannot be more than one managing controller. (see below for nested schema)
            parameters: (Block List) List of helm parameters which are passed to the helm template command upon manifest generation. (see below for nested schema)
            pass_credentials: (Boolean) Indicates if to pass credentials to all domains (helm's --pass-credentials)
            path: (String) Directory path within the git repository, and is only valid for the GitOps applications sourced from git.
            plugin: (Block List) Options specific to config management plugins. (see below for nested schema)
            project: (String) The ArgoCD project name corresponding to this GitOps application. An empty string means that the GitOps application belongs to the default project created by Harness.
            project_id: (String) Project identifier of the GitOps application.
            prune: '(Boolean) Indicates whether to delete resources from the cluster that are not found in the sources anymore as part of automated sync (default: false).'
            recurse: (Boolean) Indicates to scan a directory recursively for manifests.
            ref: (String) Reference name to be used in other source spec, used for multi-source applications.
            release_name: (String) Helm release name to use. If omitted it will use the GitOps application name.
            repo_id: (String) Repository identifier of the GitOps application. When using skipRepoValidation, this field is not required.
            repo_ids: (List of String) List of repository identifiers of the GitOps for Multi-Source application. Not required if skipRepoValidation is set to true.
            repo_url: (String) URL to the repository (git or helm) that contains the GitOps application manifests.
            request_cascade: (Boolean) Request cascade to delete the GitOps application.
            request_propagation_policy: (String) Request propagation policy to delete the GitOps application.
            retry: '(Block List, Max: 1) Contains information about the strategy to apply when a sync failed. (see below for nested schema)'
            revision_history_limit: (String) Revision history limit for the application.
            self_heal: '(Boolean) Indicates whether to revert resources back to their desired state upon modification in the cluster (default: false).'
            server: (String) URL of the target cluster server for the GitOps application.
            skip_crds: (Boolean) Indicates if to skip CRDs during helm template. Corresponds to helm --skip-crds
            skip_repo_validation: (Boolean) Indicates if the GitOps application should skip validate repository definition exists.
            skip_schema_validation: (Boolean) Indicates if to skip schema validation during helm template. Corresponds to helm --skip-schema-validation
            skip_tests: (Boolean) Indicates if to skip tests during helm template. Corresponds to helm --skip-tests
            source: '(Block List, Max: 1) Contains all information about the source of the GitOps application. (see below for nested schema)'
            sources: (Block List) List of sources for the GitOps application. Multi Source support (see below for nested schema)
            spec: '(Block List, Max: 1) Specifications of the GitOps application. This includes the repository URL, application definition, source, destination and sync policy. (see below for nested schema)'
            sync_options: (List of String) Options allow you to specify whole app sync-options.
            sync_policy: '(Block List, Max: 1) Controls when a sync will be performed in response to updates in git. (see below for nested schema)'
            target_revision: (String) Revision of the source to sync the GitOps application to. In case of git, this can be commit, tag, or branch. If omitted, will equal to HEAD. In case of Helm, this is a semver tag of the chart's version.
            tlas: (Block List) List of jsonnet top-level arguments(TLAS). (see below for nested schema)
            uid: (String) UID is the unique identifier in time and space value for this object. It is generated by the server on successful creation of a resource and is not allowed to change on PUT operations.
            upsert: (Boolean) Indicates if the GitOps application should be updated if existing and inserted if not.
            validate: (Boolean) Indicates if the GitOps application yaml has to be validated.
            value: (String) Value of the external variables of jsonnet application.
            value_files: (List of String) List of helm value files to use when generating a template.
            values: (String) Helm values to be passed to helm template, typically defined as a block.
            values_object: (Map of String) Helm values to be passed to 'helm template', typically defined as a block.
            version: (String) Helm version to use for templating (either "2" or "3")
        importStatements:
            - |-
              # Import a Project level Gitops Application
              terraform import harness_platform_gitops_applications.example <organization_id>/<project_id>/<agent_id>/<app_name>
    harness_platform_gitops_applicationset:
        subCategory: Next Gen
        description: Resource for managing a Harness Gitops Applicationset. Please note this resource is in an alpha/experimental state and is subject to change.
        name: harness_platform_gitops_applicationset
        title: harness_platform_gitops_applicationset Resource - terraform-provider-harness
        examples:
            - name: cluster_generator
              manifest: |-
                {
                  "agent_id": "account.agentuseast1",
                  "applicationset": [
                    {
                      "metadata": [
                        {
                          "name": "cluster-appset",
                          "namespace": "argocd"
                        }
                      ],
                      "spec": [
                        {
                          "generator": [
                            {
                              "clusters": [
                                {
                                  "enabled": true
                                }
                              ]
                            }
                          ],
                          "go_template": true,
                          "go_template_options": [
                            "missingkey=error"
                          ],
                          "template": [
                            {
                              "metadata": [
                                {
                                  "labels": {
                                    "env": "dev"
                                  },
                                  "name": "{{.name}}-guestbook"
                                }
                              ],
                              "spec": [
                                {
                                  "destination": [
                                    {
                                      "namespace": "app-ns-{{.name}}",
                                      "server": "{{.url}}"
                                    }
                                  ],
                                  "project": "default",
                                  "source": [
                                    {
                                      "path": "helm-guestbook",
                                      "repo_url": "https://github.com/argoproj/argocd-example-apps.git",
                                      "target_revision": "HEAD"
                                    }
                                  ]
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "org_id": "default",
                  "project_id": "projectId",
                  "upsert": true
                }
            - name: list_generator
              manifest: |-
                {
                  "agent_id": "account.agentuseast1",
                  "applicationset": [
                    {
                      "metadata": [
                        {
                          "name": "list-appset"
                        }
                      ],
                      "spec": [
                        {
                          "generator": [
                            {
                              "list": [
                                {
                                  "elements": [
                                    {
                                      "cluster": "engineering-dev",
                                      "url": "https://kubernetes.default.svc"
                                    },
                                    {
                                      "cluster": "engineering-prod",
                                      "url": "https://kubernetes.prod.svc"
                                    }
                                  ]
                                }
                              ]
                            }
                          ],
                          "go_template": true,
                          "go_template_options": [
                            "missingkey=error"
                          ],
                          "template": [
                            {
                              "metadata": [
                                {
                                  "name": "{{.cluster}}-guestbook"
                                }
                              ],
                              "spec": [
                                {
                                  "destination": [
                                    {
                                      "namespace": "default",
                                      "server": "{{.url}}"
                                    }
                                  ],
                                  "project": "default",
                                  "source": [
                                    {
                                      "path": "helm-guestbook",
                                      "repo_url": "https://github.com/argoproj/argocd-example-apps.git",
                                      "target_revision": "HEAD"
                                    }
                                  ]
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "org_id": "default",
                  "project_id": "projectId",
                  "upsert": true
                }
            - name: git_files
              manifest: |-
                {
                  "agent_id": "account.agentuseast1",
                  "applicationset": [
                    {
                      "metadata": [
                        {
                          "name": "git-files-appset"
                        }
                      ],
                      "spec": [
                        {
                          "generator": [
                            {
                              "git": [
                                {
                                  "file": [
                                    {
                                      "path": "apps/*/config.json"
                                    }
                                  ],
                                  "repo_url": "https://github.com/example/config-repo",
                                  "revision": "main"
                                }
                              ]
                            }
                          ],
                          "template": [
                            {
                              "metadata": [
                                {
                                  "name": "{{.path.basename}}-app"
                                }
                              ],
                              "spec": [
                                {
                                  "destination": [
                                    {
                                      "namespace": "{{.path.basename}}",
                                      "server": "https://kubernetes.default.svc"
                                    }
                                  ],
                                  "project": "default",
                                  "source": [
                                    {
                                      "path": "{{.path.path}}",
                                      "repo_url": "https://github.com/example/app-repo",
                                      "target_revision": "main"
                                    }
                                  ]
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "org_id": "default",
                  "project_id": "projectId",
                  "upsert": true
                }
            - name: git_directories
              manifest: |-
                {
                  "agent_id": "account.agentuseast1",
                  "applicationset": [
                    {
                      "metadata": [
                        {
                          "name": "git-directories-appset"
                        }
                      ],
                      "spec": [
                        {
                          "generator": [
                            {
                              "git": [
                                {
                                  "directory": [
                                    {
                                      "exclude": false,
                                      "path": "applicationset/examples/git-generator-directory/cluster-addons/*"
                                    }
                                  ],
                                  "repo_url": "https://github.com/argoproj/argo-cd.git",
                                  "revision": "HEAD"
                                }
                              ]
                            }
                          ],
                          "template": [
                            {
                              "metadata": [
                                {
                                  "name": "{{.path.basename}}-addon"
                                }
                              ],
                              "spec": [
                                {
                                  "destination": [
                                    {
                                      "namespace": "{{.path.basename}}",
                                      "server": "https://kubernetes.default.svc"
                                    }
                                  ],
                                  "project": "default",
                                  "source": [
                                    {
                                      "path": "{{.path.path}}",
                                      "repo_url": "https://github.com/argoproj/argo-cd.git",
                                      "target_revision": "HEAD"
                                    }
                                  ],
                                  "sync_policy": [
                                    {
                                      "automated": [
                                        {
                                          "prune": true,
                                          "self_heal": true
                                        }
                                      ]
                                    }
                                  ]
                                }
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ],
                  "org_id": "default",
                  "project_id": "projectId",
                  "upsert": true
                }
        argumentDocs:
            access_token_ref: '(Block List, Max: 1) The Personal Access Token (PAT) to use when connecting. (see below for nested schema)'
            agent_id: (String) Agent identifier of the GitOps applicationset.
            all_branches: (Boolean) Scan all branches instead of just the default branch.
            allow_empty: (Boolean) Allows apps have zero live resources.
            annotations: (Map of String) Annotations are unstructured key value pairs corresponding to a resource. External tools set these to store and retrieve arbitrary metadata.
            api: (String) The Bitbucket REST API URL to talk to e.g. https://bitbucket.org/rest.
            app_password_ref: '(Block List, Max: 1) The app password to use for the user. See: https://support.atlassian.com/bitbucket-cloud/docs/app-passwords/. (see below for nested schema)'
            app_secret_name: (String) Reference to a GitHub App repo-creds secret with permission to access pull requests.
            applications_sync: (String) Represents the policy applied on the generated applications. Possible values are create-only, create-update, create-delete, and sync.
            applicationset: '(Block List, Min: 1, Max: 1) Definition of the GitOps applicationset resource. (see below for nested schema)'
            automated: '(Block List, Max: 1) Whether to automatically keep an application synced to the target revision. (see below for nested schema)'
            azure_devops: '(Block List, Max: 1) Uses the Azure DevOps API to look up eligible repositories based on a team project within an Azure DevOps organization. (see below for nested schema)'
            backoff: '(Block List, Max: 1) Controls how to backoff on subsequent retries of failed syncs. (see below for nested schema)'
            basic_auth: '(Block List, Max: 1) Credentials for Basic auth. (see below for nested schema)'
            bitbucket_cloud: '(Block List, Max: 1) Uses the Bitbucket API V2 to scan a workspace in bitbucket.org. (see below for nested schema)'
            bitbucket_server: '(Block List, Max: 1) Fetch pull requests from a repo hosted on a Bitbucket Server. (see below for nested schema)'
            branch_match: (String) A regex which must match the branch name.
            ca_ref: '(Block List, Max: 1) Reference to a ConfigMap containing a CA certificate for self-signed GitLab instances. (see below for nested schema)'
            chart: (String) Helm chart name. Must be specified for applications sourced from a Helm repo.
            clone_protocol: (String) Which protocol to use for the SCM URL. Default is provider-specific but ssh if possible. Not all providers necessarily support all protocols.
            cluster_decision_resource: (Block List) The cluster decision resource generates a list of Argo CD clusters. (see below for nested schema)
            clusters: (Block List) The cluster generator produces parameters based on the list of items found within the cluster secret. (see below for nested schema)
            code: (Boolean) Determines whether the variable should be evaluated as jsonnet code or treated as string.
            common_annotations: (Map of String) List of additional annotations to add to rendered manifests.
            common_labels: (Map of String) List of additional labels to add to rendered manifests.
            config_map_name: (String) Name of Kubernetes ConfigMap.
            config_map_ref: (String) ConfigMap with the duck type definitions needed to retrieve the data this includes apiVersion(group/version), kind, matchKey and validation settings.
            destination: '(Block List, Max: 1) Reference to the Kubernetes server and namespace in which the application will be deployed. (see below for nested schema)'
            directory: '(Block List, Max: 1) Path/directory specific options. (see below for nested schema)'
            duration: (String) Duration is the amount to back off. Default unit is seconds, but could also be a duration (e.g. 2m, 1h), as a string.
            elements: (List of Map of String) List of key/value pairs to pass as parameters into the template.
            enabled: (Boolean) Boolean value defaulting to true to indicate that this block has been added thereby allowing all other attributes to be optional.
            env: (Block List) Environment variables passed to the plugin. (see below for nested schema)
            exclude: '(String) Glob pattern to match paths against that should be explicitly excluded from being used during manifest generation. This takes precedence over the include field. To match multiple patterns, wrap the patterns in {} and separate them with commas. For example: ''{config.yaml,env-use2/*}'''
            ext_var: (Block List) List of Jsonnet External Variables. (see below for nested schema)
            factor: (String) Factor to multiply the base duration after each failed retry.
            file: (Block List) List of files in the source repository to use when template the Application. (see below for nested schema)
            file_parameters: (Block List) File parameters for the helm template. (see below for nested schema)
            filter: (Block List) Filters allow selecting which pull requests to generate for. (see below for nested schema)
            finalizers: (List of String) List of finalizers to apply to the resulting Application.
            force_common_annotations: (Boolean) Indicates if to force applying common annotations to resources for kustomize apps.
            force_common_labels: (Boolean) Indicates if to force apply common labels to resources for kustomize apps.
            force_string: (Boolean) Determines whether to tell Helm to interpret booleans and numbers as strings.
            generation: (String) A sequence number representing a specific generation of the desired state. This is a read-only value populated by the system.
            generator: '(Block List, Min: 1) Application set generators are responsible for generation of params, which are then rendered into the template: fields of the ApplicationSet resource. (see below for nested schema)'
            git: (Block List) Git generators generates parameters using either the directory structure of a specified Git repository (directory generator), or, using the contents of JSON/YAML files found within a specified repository (file generator). (see below for nested schema)
            gitea: '(Block List, Max: 1) Specify the repository from which to fetch the Gitea Pull requests. (see below for nested schema)'
            github: '(Block List, Max: 1) Specify the repository from which to fetch the GitHub Pull requests. (see below for nested schema)'
            gitlab: '(Block List, Max: 1) Specify the project from which to fetch the GitLab merge requests. (see below for nested schema)'
            go_template: (Boolean) Enable Go templating for the template field.
            go_template_options: (List of String) Optional list of go templating options, see https://pkg.go.dev/text/template#Template.Optional. This is only relevant if goTemplate is true
            group: (String) The Kubernetes resource Group to match for.
            helm: '(Block List, Max: 1) Helm specific options. (see below for nested schema)'
            id: (String) The ID of this resource.
            identifier: (String) Identifier of the GitOps applicationset. This is a unique identifier for the applicationset generated automatically.
            ignore_application_differences: (Block List) Application Set ignoreApplicationDifferences (see below for nested schema)
            ignore_difference: '(Block List) Resources and their fields which should be ignored during comparison. More info: https://argo-cd.readthedocs.io/en/stable/user-guide/diffing/#application-level-configuration. (see below for nested schema)'
            ignore_missing_value_files: (Boolean) Prevents 'helm template' from failing when value_files do not exist locally by not appending them to 'helm template --values'.
            images: (List of String) List of Kustomize image override specifications.
            include: '(String) Glob pattern to match paths against that should be explicitly included during manifest generation. If this field is set, only matching manifests will be included. To match multiple patterns, wrap the patterns in {} and separate them with commas. For example: ''{.yml,.yaml}'''
            include_subgroups: (Boolean) Recurse through subgroups (true) or scan only the base group (false). Defaults to false.
            info: (Block List) List of information (URLs, email addresses, and plain text) that relates to the application. (see below for nested schema)
            insecure: '(Boolean) Allow insecure tls, for self-signed certificates; default: false.'
            jq_path_expressions: (List of String) List of JQ path expression strings targeting the field(s) to ignore.
            json_pointers: (List of String) List of JSONPaths strings targeting the field(s) to ignore.
            jsonnet: '(Block List, Max: 1) Jsonnet specific options. (see below for nested schema)'
            key: (String) The label key that the selector applies to.
            kind: (String) The Kubernetes resource Kind to match for.
            kustomize: '(Block List, Max: 1) Kustomize specific options. (see below for nested schema)'
            label_match: (String) A regex which must match at least one label.
            label_selector: '(Block List, Max: 1) Label selector used to find the resource defined in the config_map_ref. Alternative to name. (see below for nested schema)'
            labels: (Map of String) Map of string keys and values that can be used to organize and categorize (scope and select) objects. May match selectors of replication controllers and services.
            libs: (List of String) Additional library search dirs.
            limit: (String) Maximum number of attempts for retrying a failed sync. If set to 0, no retries will be performed.
            list: (Block List) List generators generate parameters based on an arbitrary list of key/value pairs (as long as the values are string values). (see below for nested schema)
            managed_namespace_metadata: '(Block List, Max: 1) Controls metadata in the given namespace (if CreateNamespace=true). (see below for nested schema)'
            match_expressions: (Block List) A list of label selector requirements. The requirements are ANDed. (see below for nested schema)
            match_labels: (Map of String) A map of {key,value} pairs. A single {key,value} in the matchLabels map is equivalent to an element of match_expressions, whose key field is "key", the operator is "In", and the values array contains only "value". The requirements are ANDed.
            matrix: (Block List) Matrix generators combine the parameters generated by two child generators, iterating through every combination of each generator's generated parameters. Take note of the restrictions regarding their usage - particularly regarding nesting matrix generators. (see below for nested schema)
            max_duration: (String) Maximum amount of time allowed for the backoff strategy. Default unit is seconds, but could also be a duration (e.g. 2m, 1h), as a string.
            max_update: (String) Maximum number of simultaneous Application updates in a group. Supports both integer and percentage string values (rounds down, but floored at 1 Application for >0%). Default is 100%, unbounded.
            merge: (Block List) Merge generators combine parameters produced by the base (first) generator with matching parameter sets produced by subsequent generators. Take note of the restrictions regarding their usage - particularly regarding nesting merge generators. (see below for nested schema)
            merge_keys: (List of String) Keys to merge into resulting parameter set.
            metadata: '(Block List, Min: 1, Max: 1) Standard Kubernetes object metadata. (see below for nested schema)'
            name: (String) Name must be unique within a namespace. It is required when creating resources, although some resources may allow a client to request the generation of an appropriate name automatically. Name is primarily intended for creation idempotence and configuration definition. Name cannot be updated.
            name_prefix: (String) Prefix appended to resources for Kustomize apps.
            name_suffix: (String) Suffix appended to resources for Kustomize apps.
            namespace: (String) Namespace of the GitOps application. An empty namespace is equivalent to the namespace of the GitOps agent.
            operator: (String) A key's relationship to a set of values. Valid operators ard In, NotIn, Exists and DoesNotExist.
            org_id: (String) Organization identifier of the GitOps applicationset.
            organization: (String) Azure Devops organization. E.g. "my-organization".
            owner: (String) Gitea org or user to scan.
            parameters: (Block List) Helm parameters which are passed to the helm template command upon manifest generation. (see below for nested schema)
            pass_credentials: (Boolean) If true then adds '--pass-credentials' to Helm commands to pass credentials to all domains.
            password_ref: '(Block List, Max: 1) Password (or personal access token) reference. (see below for nested schema)'
            path: (String) Directory path within the repository. Only valid for applications sourced from Git.
            path_param_prefix: (String) Prefix for all path-related parameter names.
            paths_do_not_exist: (List of String) An array of paths, all of which must not exist.
            paths_exist: (List of String) An array of paths, all of which must exist.
            plugin: '(Block List, Max: 1) Config management plugin specific options. (see below for nested schema)'
            preserve_resources_on_deletion: (Boolean) Label selector used to narrow the scope of targeted clusters.
            project: (String) The project the application belongs to.
            project_id: (String) Project identifier of the GitOps applicationset.
            prune: (Boolean) Whether to delete resources from the cluster that are not found in the sources anymore as part of automated sync.
            pull_request: (Block List) Pull Request generators uses the API of an SCMaaS provider to automatically discover open pull requests within a repository. (see below for nested schema)
            pull_request_state: '(String) additional MRs filter to get only those with a certain state. Default:  "" (all states).'
            recurse: (Boolean) Whether to scan a directory recursively for manifests.
            ref: (String) Reference to another source within defined sources. See associated documentation on Helm value files from external Git repository regarding combining ref with path and/or chart.
            release_name: (String) Helm release name. If omitted it will use the application name.
            repo: (String) Repo name to scan.
            repo_url: (String) URL to the repository (Git or Helm) that contains the application manifests.
            repository_match: (String) A regex for repo names.
            requeue_after_seconds: '(String) How often to check for changes (in seconds). Default: 3min.'
            retry: '(Block List, Max: 1) Controls failed sync retry behavior. (see below for nested schema)'
            revision: (String) Revision of the source repository to use.
            revision_history_limit: (String) Limits the number of items kept in the application's revision history, which is used for informational purposes as well as for rollbacks to previous versions. This should only be changed in exceptional circumstances. Setting to zero will store no history. This will reduce storage used. Increasing will increase the space used to store the history, so we do not recommend increasing it. Default is 10.
            rolling_sync: (Block List) Strategy allowing you to group Applications by labels present on the generated Application resources. When the ApplicationSet changes, the changes will be applied to each group of Application resources sequentially. (see below for nested schema)
            scm_provider: (Block List) SCM Provider generators uses the API of an SCMaaS provider to automatically discover repositories within an organization. (see below for nested schema)
            secret_name: (String) Name of Kubernetes Secret.
            selector: '(Block List, Max: 1) The Selector allows to post-filter based on generated values using the kubernetes common labelSelector format. (see below for nested schema)'
            self_heal: (Boolean) Whether to revert resources back to their desired state upon modification in the cluster.
            server: (String) URL of the target cluster and must be set to the Kubernetes control plane API.
            skip_crds: (Boolean) Whether to skip custom resource definition installation step (Helm's --skip-crds).
            skip_schema_validation: (Boolean) Indicates if to skip schema validation during helm template. Corresponds to helm --skip-schema-validation
            skip_tests: (Boolean) Indicates if to skip tests during helm template. Corresponds to helm --skip-tests
            source: (Block List) Location of the application's manifests or chart. (see below for nested schema)
            sources: (Block List) Location of the application's manifests or chart. Use when specifying multiple fields (see below for nested schema)
            spec: '(Block List, Min: 1, Max: 1) Spec of the GitOps applicationset. Includes the generators and template. (see below for nested schema)'
            step: '(Block List, Min: 1) Configuration used to define which applications to include in each stage of the rolling sync. All Applications in each group must become Healthy before the ApplicationSet controller will proceed to update the next group of Applications. (see below for nested schema)'
            strategy: '(Block List, Max: 1) Progressive Sync strategy (see below for nested schema)'
            sync_options: '(List of String) List of sync options. More info: https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/.'
            sync_policy: '(Block List, Max: 1) Application Set sync policy (see below for nested schema)'
            target_revision: (String) Revision of the source to sync the application to. In case of Git, this can be commit, tag, or branch. If omitted, will equal to HEAD. In case of Helm, this is a semver tag for the Chart's version.
            team_project: (String) Azure Devops team project. E.g. "my-team".
            template: '(Block List, Min: 1, Max: 1) Application Set template. The template fields of the ApplicationSet spec are used to generate Gitops Applications. (see below for nested schema)'
            tlas: (Block List) List of Jsonnet Top-level Arguments (see below for nested schema)
            token_ref: '(Block List, Max: 1) Authentication token reference. (see below for nested schema)'
            type: (String) Type of progressive sync.
            uid: (String) UID is the unique identifier in time and space value for this object. It is generated by the server on successful creation of a resource and is not allowed to change on PUT operations.
            upsert: (Boolean) Indicates if the GitOps application should be updated if existing and inserted if not.
            user: (String) Bitbucket user to use when authenticating. Should have a "member" role to be able to read all repositories and branches.
            username: (String) Username for Basic auth.
            value: (String) Value of the information.
            value_files: (List of String) List of Helm value files to use when generating a template.
            values: (Map of String) Arbitrary string key-value pairs which are passed directly as parameters to the template.
            values_object: (Map of String) Helm values to be passed to 'helm template', typically defined as a block.
            version: (String) Helm version to use for templating (either "2" or "3").
        importStatements:
            - |-
              # Import gitOps applicationset with account level agent, agent id has account prefix #
              terraform import harness_platform_gitops_applicationset.example <organization_id>/<project_id>/<agent_id>/<identifier>

              # Import gitOps applicationset with org level agent, agent id has org prefix #
              terraform import harness_platform_gitops_applicationset.example <organization_id>/<project_id>/<agent_id>/<identifier>

              # Import gitOps applicationset with project level agent #
              terraform import harness_platform_gitops_applicationset.example <organization_id>/<project_id>/<agent_id>/<identifier>
    harness_platform_gitops_cluster:
        subCategory: Next Gen
        description: Resource for managing a Harness Gitops Cluster.
        name: harness_platform_gitops_cluster
        title: harness_platform_gitops_cluster Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "account_id": "account_id",
                  "agent_id": "agent_id",
                  "identifier": "identifier",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${request.0.upsert}",
                        "${request.0.cluster.0.config.0.bearer_token}"
                      ]
                    }
                  ],
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "request": [
                    {
                      "cluster": [
                        {
                          "config": [
                            {
                              "cluster_connection_type": "IN_CLUSTER",
                              "tls_client_config": [
                                {
                                  "insecure": true
                                }
                              ]
                            }
                          ],
                          "name": "name",
                          "server": "https://kubernetes.default.svc"
                        }
                      ],
                      "upsert": false
                    }
                  ]
                }
              references:
                lifecycle.ignore_changes: request.0.upsert
            - name: example
              manifest: |-
                {
                  "account_id": "account_id",
                  "agent_id": "account.agent_id",
                  "identifier": "identifier",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${request.0.upsert}",
                        "${request.0.cluster.0.config.0.bearer_token}"
                      ]
                    }
                  ],
                  "org_id": "org_id",
                  "request": [
                    {
                      "cluster": [
                        {
                          "config": [
                            {
                              "cluster_connection_type": "IN_CLUSTER",
                              "tls_client_config": [
                                {
                                  "insecure": true
                                }
                              ]
                            }
                          ],
                          "name": "name",
                          "server": "https://kubernetes.default.svc"
                        }
                      ],
                      "tags": [
                        "foo:bar"
                      ],
                      "upsert": false
                    }
                  ]
                }
              references:
                lifecycle.ignore_changes: request.0.upsert
            - name: example
              manifest: |-
                {
                  "account_id": "account_id",
                  "agent_id": "agent_id",
                  "identifier": "identifier",
                  "lifecycle": [
                    {
                      "ignore_changes": [
                        "${request.0.upsert}",
                        "${request.0.cluster.0.config.0.bearer_token}"
                      ]
                    }
                  ],
                  "org_id": "org_id",
                  "project_id": "project_id",
                  "request": [
                    {
                      "cluster": [
                        {
                          "config": [
                            {
                              "bearer_token": "ey......X",
                              "cluster_connection_type": "SERVICE_ACCOUNT",
                              "tls_client_config": [
                                {
                                  "ca_data": "LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tClhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWApYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFgKLS0tLS1FTkQgQ0VSVElGSUNBVEUtLS0tLQ=="
                                }
                              ]
                            }
                          ],
                          "name": "name",
                          "server": "https://1.2.3.4"
                        }
                      ],
                      "upsert": false
                    }
                  ]
                }
              references:
                lifecycle.ignore_changes: request.0.upsert
        argumentDocs:
            CLUSTER_CONNECTION_TYPE_NOT_SET: '- Connection type will be automatically detected based on provided credentials'
            EXEC_PROVIDER: '- Authenticates using an external command that dynamically generates tokens. Configured via exec_provider_config block. Used for Azure/GCP Workload Identity, OIDC, and custom authentication plugins'
            IN_CLUSTER: '- Uses the GitOps Agent''s own ServiceAccount credentials. Only valid when server is https://kubernetes.default.svc (the cluster where the agent is deployed)'
            IRSA: '- Authenticates using AWS IAM Roles for Service Accounts. Requires role_a_r_n and aws_cluster_name fields for EKS clusters'
            SERVICE_ACCOUNT: '- Authenticates using an explicit ServiceAccount bearer token provided in the bearer_token field'
            TLS_CLIENT_CERT: '- Authenticates using X.509 client certificates for mutual TLS (mTLS). Requires both cert_data and key_data in the tls_client_config block'
            USERNAME_PASSWORD: '- Authenticates using basic authentication with username and password fields (deprecated in modern Kubernetes, not recommended)'
            account_id: (String, Deprecated) Account identifier of the GitOps cluster.
            agent_id: (String) Agent identifier of the GitOps cluster. (include scope prefix)
            annotations: (Map of String) Annotations for cluster secret metadata.
            api_version: (String) Preferred input version of the ExecInfo.
            api_versions: (List of String)
            apis_count: (String)
            applications_count: (String)
            args: (List of String) Arguments to pass to the command when executing it.
            attempted_at: (List of Object) (see below for nested schema)
            aws_cluster_name: (String) AWS Cluster name. If set then AWS CLI EKS token command will be used to access cluster.
            bearer_token: (String, Sensitive) Bearer authentication token the cluster.
            ca_data: (String) CA data holds PEM-encoded bytes (typically read from a root certificates bundle). Use this if you are using self-signed certificates. CAData takes precedence over CAFile. The value should be base64 encoded.
            cache_info: (List of Object) (see below for nested schema)
            cert_data: (String) Certificate data holds PEM-encoded bytes (typically read from a client certificate file). CertData takes precedence over CertFile. Use this if you are using mTLS. The value should be base64 encoded.
            cluster: '(Block List, Max: 1) GitOps cluster details. (see below for nested schema)'
            cluster_connection_type: '(String) Identifies the authentication method used to connect to the cluster. Valid values:'
            cluster_resources: (Boolean) Indicates if cluster level resources should be managed. This setting is used only if cluster is connected in a namespaced mode.
            command: (String) Command to execute.
            config: '(Block List, Min: 1, Max: 1) GitOps cluster config. (see below for nested schema)'
            connection_state: (List of Object) (see below for nested schema)
            disable_compression: (Boolean) DisableCompression bypasses automatic GZip compression requests to to the cluster's API server. Corresponds to running kubectl with --disable-compression
            env: (Map of String) Additional environment variables to expose to the process.
            exec_provider_config: '(Block List, Max: 1) Configuration for an exec provider. (see below for nested schema)'
            force_delete: (Boolean) Indicates if the cluster should be deleted forcefully, regardless of existing applications using that cluster.
            force_update: (Boolean) Indicates if the cluster should be updated forcefully, regardless of existing applications using that cluster.
            id: (String) The ID of this resource.
            identifier: (String) Identifier of the GitOps cluster.
            info: (List of Object) Information about cluster cache and state. (see below for nested schema)
            insecure: (Boolean) Indicates if the TLS connection to the cluster should be insecure.
            install_hint: (String) Message displayed when the executable is not found.
            key_data: (String) Key data holds PEM-encoded bytes (typically read from a client certificate key file). KeyData takes precedence over KeyFile. Use this if you are using mTLS. The value should be base64 encoded.
            labels: (Map of String) Labels for cluster secret metadata.
            last_cache_sync_time: (String)
            message: (String)
            name: (String) Name of the cluster. If omitted, the server address will be used.
            namespaces: (List of String) List of namespaces which are accessible in that cluster. Cluster level resources will be ignored if namespace list is not empty.
            nanos: (Number) Non-negative fractions of a second at nanosecond resolution. Negative second values with fractions must still have non-negative nanos values that count forward in time. Must be from 0 to 999,999,999 inclusive. This field may be limited in precision depending on context.
            org_id: (String) Organization identifier of the cluster.
            password: (String) Password of the server of the cluster.
            project: (String) The ArgoCD project name corresponding to this GitOps cluster. An empty string means that the GitOps cluster belongs to the default project created by Harness.
            project_id: (String) Project identifier of the GitOps cluster.
            proxy_url: (String) The URL to the proxy to be used for all requests send to the cluster's API server
            refresh_requested_at: '(Block List, Max: 1) Time when cluster cache refresh has been requested. (see below for nested schema)'
            request: '(Block List, Max: 1) Cluster create or update request. (see below for nested schema)'
            resources_count: (String)
            role_a_r_n: (String) Optional role ARN. If set then used for AWS IAM Authenticator.
            seconds: (String) Represents seconds of UTC time since Unix epoch 1970-01-01T00:00:00Z. Must be from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59Z inclusive.
            server: (String) API server URL of the kubernetes cluster.
            server_name: (String) Server name for SNI in the client to check server certificates against. If ServerName is empty, the hostname used to contact the server is used.
            server_version: (String)
            shard: (String) Shard number to be managed by a specific application controller pod. Calculated on the fly by the application controller if not specified.
            status: (String)
            tags: (Set of String) Tags for the GitOps cluster. These can be used to search or filter the GitOps agents.
            tls_client_config: '(Block List, Max: 1) Settings to enable transport layer security. (see below for nested schema)'
            updated_fields: (List of String) Fields which are updated.
            upsert: (Boolean) Indicates if the GitOps cluster should be updated if existing and inserted if not.
            username: (String) Username of the server of the cluster.
        importStatements:
            - |-
              # Import an Account level Gitops Cluster
              terraform import harness_platform_gitops_cluster.example <agent_id>/<cluster_id>

              # Import an Org level Gitops Cluster
              terraform import harness_platform_gitops_cluster.example <organization_id>/<agent_id>/<cluster_id>

              # Import a Project level Gitops Cluster
              terraform import harness_platform_gitops_cluster.example <organization_id>/<project_id>/<agent_id>/<cluster_id>
    harness_platform_gitops_filters Resource - terraform-provider-harness:
