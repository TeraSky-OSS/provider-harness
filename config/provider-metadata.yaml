                  "ssh": [
                    {
                      "credential_type": "KeyPath",
                      "sshkey_path_credential": [
                        {
                          "encrypted_passphrase": "encrypted_passphrase",
                          "key_path": "key_path",
                          "user_name": "user_name"
                        }
                      ]
                    }
                  ],
                  "tags": [
                    "foo:bar"
                  ]
                }
            - name: ssh_password
