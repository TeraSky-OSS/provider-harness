            email: (String) The email of the user.
            group_ids: (Set of String) The groups the user belongs to. This is only used during the creation of the user. The groups are not updated after the user is created. When using this option you should also set lifecycle = { ignore_changes = ["group_ids"] }.
            id: (String) Unique identifier of the user.
            is_email_verified: (Boolean) Flag indicating whether or not the users email has been verified.
            is_imported_from_identity_provider: (Boolean) Flag indicating whether or not the user was imported from an identity provider.
            is_password_expired: (Boolean) Flag indicating whether or not the users password has expired.
            is_two_factor_auth_enabled: (Boolean) Flag indicating whether or not two-factor authentication is enabled for the user.
            is_user_locked: (Boolean) Flag indicating whether or not the user is locked out.
            name: (String) The name of the user.
        importStatements:
            - |-
              # Import using the email address of the user
              terraform import harness_user.john_doe john.doe@example.com
    harness_user_group:
        subCategory: First Gen
        description: Resource for creating a Harness user group
        name: harness_user_group
        title: harness_user_group Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "description": "This group demonstrates account level and resource level permissions.",
                  "name": "example-group",
                  "permissions": [
                    {
                      "account_permissions": [
                        "ADMINISTER_OTHER_ACCOUNT_FUNCTIONS",
                        "MANAGE_API_KEYS"
                      ],
                      "app_permissions": [
                        {
                          "all": [
                            {
                              "actions": [
                                "CREATE",
                                "READ",
                                "UPDATE",
                                "DELETE"
                              ]
                            }
                          ],
                          "deployment": [
                            {
                              "actions": [
                                "READ",
                                "ROLLBACK_WORKFLOW",
                                "EXECUTE_PIPELINE",
                                "EXECUTE_WORKFLOW"
                              ],
                              "filters": [
                                "NON_PRODUCTION_ENVIRONMENTS"
                              ]
                            },
                            {
                              "actions": [
                                "READ"
                              ],
                              "filters": [
                                "PRODUCTION_ENVIRONMENTS"
                              ]
                            }
                          ],
                          "environment": [
                            {
                              "actions": [
                                "CREATE",
                                "READ",
                                "UPDATE",
                                "DELETE"
                              ],
                              "filters": [
                                "NON_PRODUCTION_ENVIRONMENTS"
                              ]
                            },
                            {
                              "actions": [
                                "READ"
                              ],
                              "filters": [
                                "PRODUCTION_ENVIRONMENTS"
                              ]
                            }
                          ],
                          "pipeline": [
                            {
                              "actions": [
                                "CREATE",
                                "READ",
                                "UPDATE",
                                "DELETE"
                              ],
                              "filters": [
                                "NON_PRODUCTION_PIPELINES"
                              ]
                            },
                            {
                              "actions": [
                                "READ"
                              ],
                              "filters": [
                                "PRODUCTION_PIPELINES"
                              ]
                            }
                          ],
                          "provisioner": [
                            {
                              "actions": [
                                "UPDATE",
                                "DELETE"
                              ]
                            },
                            {
                              "actions": [
                                "CREATE",
                                "READ"
                              ]
                            }
                          ],
                          "service": [
                            {
                              "actions": [
                                "UPDATE",
                                "DELETE"
                              ]
                            },
                            {
                              "actions": [
                                "UPDATE",
                                "DELETE"
                              ]
                            }
                          ],
                          "template": [
                            {
                              "actions": [
                                "CREATE",
                                "READ",
                                "UPDATE",
                                "DELETE"
                              ]
                            }
                          ],
                          "workflow": [
                            {
                              "actions": [
                                "UPDATE",
                                "DELETE"
                              ],
                              "filters": [
                                "NON_PRODUCTION_WORKFLOWS"
                              ]
                            },
                            {
                              "actions": [
                                "CREATE",
                                "READ"
                              ],
                              "filters": [
                                "PRODUCTION_WORKFLOWS",
                                "WORKFLOW_TEMPLATES"
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  ]
                }
        argumentDocs:
            account_permissions: (Set of String) The account permissions of the user group. Valid options are ADMINISTER_OTHER_ACCOUNT_FUNCTIONS, CREATE_AND_DELETE_APPLICATION, CREATE_CUSTOM_DASHBOARDS, MANAGE_ALERT_NOTIFICATION_RULES, MANAGE_API_KEYS, MANAGE_APPLICATION_STACKS, MANAGE_AUTHENTICATION_SETTINGS, MANAGE_CLOUD_PROVIDERS, MANAGE_CONFIG_AS_CODE, MANAGE_CONNECTORS, MANAGE_CUSTOM_DASHBOARDS, MANAGE_DELEGATE_PROFILES, MANAGE_DELEGATES, MANAGE_DEPLOYMENT_FREEZES, MANAGE_IP_WHITELIST, MANAGE_PIPELINE_GOVERNANCE_STANDARDS, MANAGE_RESTRICTED_ACCESS, MANAGE_SECRET_MANAGERS, MANAGE_SECRETS, MANAGE_SSH_AND_WINRM, MANAGE_TAGS, MANAGE_TEMPLATE_LIBRARY, MANAGE_USER_AND_USER_GROUPS_AND_API_KEYS, MANAGE_USERS_AND_GROUPS, READ_USERS_AND_GROUPS, VIEW_AUDITS, VIEW_USER_AND_USER_GROUPS_AND_API_KEYS
            actions: (Set of String) The actions allowed to be performed. Valid options are CREATE, READ, UPDATE, DELETE, EXECUTE_WORKFLOW, EXECUTE_PIPELINE, ROLLBACK_WORKFLOW
            all: (Block Set) The permission to perform actions against all resources. (see below for nested schema)
            app_ids: (Set of String) The application IDs to which the permission applies. Leave empty to apply to all applications.
            app_permissions: '(Block List, Max: 1) Application specific permissions (see below for nested schema)'
            deployment: (Block Set) Permission configuration to perform actions against deployments. (see below for nested schema)
            description: (String) The description of the user group.
            env_ids: (Set of String) The environment IDs to which the permission applies. Leave empty to apply to all environments.
            environment: (Block Set) Permission configuration to perform actions against workflows. (see below for nested schema)
            filters: '(Set of String) The filters to apply to the action. Valid options are: NON_PRODUCTION_ENVIRONMENTS, PRODUCTION_ENVIRONMENTS.'
            group_dn: (String) The group DN of the LDAP user group.
            group_email_addresses: (List of String) The email addresses of the user group.
            group_name: (String) The group name of the LDAP user group.
            id: (String) Unique identifier of the user group.
            imported_by_scim: (Boolean) Indicates whether the user group was imported by SCIM.
            is_sso_linked: (Boolean) Indicates whether the user group is linked to an SSO provider.
            ldap_settings: '(Block List, Max: 1) The LDAP settings for the user group. (see below for nested schema)'
            microsoft_teams_webhook_url: (String) The Microsoft Teams webhook URL of the user group.
            name: (String) The name of the user group.
