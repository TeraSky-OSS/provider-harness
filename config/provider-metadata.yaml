    harness_yaml_config:
        subCategory: First Gen
        description: 'Resource for creating a raw YAML configuration in Harness. Note: This works for all objects EXCEPT application objects. This resource uses the config-as-code API''s. When updating the name or path of this resource you should typically also set the create_before_destroy = true lifecycle setting.'
        name: harness_yaml_config
        title: harness_yaml_config Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "content": "harnessApiVersion: '1.0'\ntype: KUBERNETES_CLUSTER\ndelegateSelectors:\n- k8s\nskipValidation: true\nuseKubernetesDelegate: true\n",
                  "path": "Setup/Cloud Providers/Kubernetes.yaml"
                }
        argumentDocs:
            app_id: (String) The id of the application. This is required for all resources except global ones.
            content: (String) The raw YAML configuration.
            id: (String) The unique id of the resource.
            name: (String) The name of the resource.
            path: (String) The path of the resource.
        importStatements:
            - |-
              # Importing a global config only using the yaml path
              terraform import harness_yaml_config.k8s_cloudprovider "Setup/Cloud Providers/kubernetes.yaml"

              # Importing a service which requires both the application id and the yaml path.
              terraform import harness_yaml_config.k8s_cloudprovider "Setup/Applications/MyApp/Services/MyService/Index.yaml:<APPLICATION_ID>"
