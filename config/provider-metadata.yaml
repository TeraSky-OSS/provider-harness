        description: Resource for creating a Harness AutoStopping rule for Scaling Groups.
        name: harness_autostopping_rule_scale_group
        title: harness_autostopping_rule_scale_group Resource - terraform-provider-harness
        examples:
            - name: test
              manifest: |-
                {
                  "cloud_connector_id": "test-connector",
                  "custom_domains": [
                    "app.example.com"
                  ],
                  "http": [
                    {
                      "health": [
                        {
                          "path": "/",
                          "port": 80,
                          "protocol": "http",
                          "status_code_from": 200,
                          "status_code_to": 299,
                          "timeout": 30
                        }
                      ],
                      "proxy_id": "lb-id",
                      "routing": [
                        {
                          "action": "forward",
                          "source_port": 80,
                          "source_protocol": "http",
                          "target_port": 80,
                          "target_protocol": "http"
                        }
                      ]
                    }
                  ],
                  "idle_time_mins": 5,
                  "name": "test",
                  "scale_group": [
                    {
                      "desired": 1,
                      "id": "asg-arn",
                      "max": 2,
                      "min": 1,
                      "name": "asg-name",
                      "on_demand": 1,
                      "region": "us-east-1"
                    }
                  ]
                }
        argumentDocs:
            action: (String) Action to take for the routing rule
            cloud_connector_id: (String) Id of the cloud connector
            custom_domains: (List of String) Custom URLs used to access the instances
            delay_in_sec: (Number) Number of seconds the rule should wait after warming up the dependent rule
