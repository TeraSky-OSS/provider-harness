    harness_platform_manual_freeze:
        subCategory: Next Gen
        description: Resource for Manual Deployment Freeze Window.
        name: harness_platform_manual_freeze
        title: harness_platform_manual_freeze Resource - terraform-provider-harness
        examples:
            - name: example
              manifest: |-
                {
                  "account_id": "accountIdentifier",
                  "identifier": "identifier",
                  "org_id": "orgIdentifier",
                  "project_id": "projectIdentifier",
                  "yaml": "freeze:\n  name: freezeName\n  identifier: identifier\n  entityConfigs:\n    - name: r1\n      entities:\n        - filterType: All\n          type: Org\n        - filterType: All\n          type: Project\n        - filterType: All\n          type: Service\n        - filterType: All\n          type: EnvType\n  status: Disabled\n  description: hi\n  windows:\n  - timeZone: Asia/Calcutta\n    startTime: 2023-05-03 04:16 PM\n    duration: 30m\n    recurrence:\n      type: Daily\n  notificationRules: []\n  tags: {}\n"
                }
        argumentDocs:
            account_id: (String) Account Identifier of the freeze
            current_or_upcoming_windows: (List of Object) Current or upcoming windows (see below for nested schema)
            description: (String) Description of the freeze
            duration: (String)
            end_time: (Number)
            freeze_windows: (Set of Object) Freeze windows in the freeze response (see below for nested schema)
            id: (String) The ID of this resource.
            identifier: (String) Identifier of the freeze
            name: (String) Name of the freeze
            org_id: (String) Organization identifier of the freeze
            project_id: (String) Project identifier of the freeze
            recurrence: (List of Object) (see below for nested schema)
            recurrence_spec: (List of Object) (see below for nested schema)
            scope: (String) Scope of the freeze
            start_time: (Number)
            status: (String) Status of the freeze
            tags: (Set of String) Tags associated with the freeze
            time_zone: (String)
            type: (String) Type of freeze
            until: (String)
            value: (Number)
            yaml: (String) Yaml of the freeze
        importStatements:
            - |-
              # Import an account level freeze
              terraform import harness_connector.example <freeze_id>

              # Import an organization level freeze
              terraform import harness_connector.example <org_id>/<freeze_id>

              # Import project level freeze
              terraform import harness_platform_manual_freeze.example <org_id>/<project_id>/<freeze_id>
