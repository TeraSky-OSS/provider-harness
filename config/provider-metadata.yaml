  deploymentVerification = {\n                enabled                  = true\n                serviceInstanceFieldName = \"pod\"\n              }\n            }\n          }\n        ]\n        # Below section is for adding your own custom thresholds\n        metricPacks = [\n          {\n            identifier = \"Custom\",\n            metricThresholds = [\n              {\n                type = \"IgnoreThreshold\",\n                spec = {\n                  action = \"Ignore\"\n                },\n                criteria = {\n                  type = \"Absolute\",\n                  spec = {\n                    greaterThan = 100\n                  }\n                },\n                metrictype = \"Custom\",\n                metricName = \"metric\"\n              },\n              {\n                \"type\" = \"FailImmediately\",\n                \"spec\" = {\n                  \"action\" = \"FailAfterOccurrence\",\n                  \"spec\" = {\n                    \"count\" = 2\n                  }\n                },\n                \"criteria\" = {\n                  \"type\" = \"Absolute\",\n                  \"spec\" = {\n                    \"greaterThan\" = 100\n                  }\n                },\n                \"metricType\" = \"Custom\",\n                \"metricName\" = \"metric\"\n              }\n            ]\n          }\n        ]\n      })}",
